<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execution Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-mono">

<div class="max-w-4xl mx-auto px-6 py-10 space-y-8">

<nav class="flex justify-between text-sm border-b pb-3">
<div>EXECUTION LAYER</div>
<div class="flex gap-6">
<a href="/">ENTRY</a>
<a href="/institutional">INSTITUTIONAL</a>
</div>
</nav>

<h1>REAL-TIME VERIFICATION ENGINE</h1>
<p>VALIDATION PRECEDES EXECUTION</p>

<div class="border p-4 space-y-2">

<p>INPUT STREAM CONNECTED</p>
<p id="status">STATUS: AWAITING COMMAND</p>

<button id="execBtn" onclick="exec()" class="border px-3 py-1 mt-3">INITIATE</button>

</div>

<section class="text-sm">
<p>NOT INTERFACE</p>
<p>ENFORCEMENT LAYER</p>
</section>

<section class="border-t pt-4 text-sm">
<p>SYSTEM ACCESS POINT</p>
<p>execution@executia.io</p>
</section>

</div>

<script>
function exec(){
 let s=document.getElementById("status")
 let btn=document.getElementById("execBtn")

 btn.disabled=true

 s.innerHTML="COMMAND ACCEPTED"

 setTimeout(()=>{
  s.innerHTML="SYSTEM VALIDATING"

  setTimeout(()=>{
   s.innerHTML="COMMAND LOCKED"

   setTimeout(()=>{
     let minute = new Date().getMinutes()

     if(minute % 2 === 0){
       s.innerHTML="STATUS: EXECUTION VERIFIED"
       s.style.color="lime"
     } else {
       s.innerHTML="STATUS: SYSTEM BLOCKED"
       s.style.color="red"
     }
   },700)

  },600)

 },400)
}
</script>

</body>
</html>
