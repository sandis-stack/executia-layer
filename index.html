<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EXECUTIA — Execution Layer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --blue:  #1E3A8A;
      --blue-b:#2563EB;
      --red:   #DC2626;
      --text:  #e5e7eb;
      --dim:   rgba(229,231,235,0.42);
      --mono:  'JetBrains Mono', monospace;
    }

    html, body { height:100%; background:radial-gradient(circle at center, #0A1F44 0%, #05070f 100%); background-attachment:fixed; color:var(--text); font-family:var(--mono); overflow:hidden; }

    canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.2; }
    #overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0; transition:opacity 0.6s ease; pointer-events:none; }

    /* NAV */
    #nav {
      position:fixed; top:0; left:0; right:0; z-index:20;
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 40px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(6px);
      background:rgba(5,7,15,0.4);
    }
    #nav a {
      font-size:15px;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.75);
      text-shadow:0 0 6px rgba(255,255,255,0.08);
      text-decoration:none;
      transition:color 0.2s ease;
    }
    #nav a:hover { color:rgba(255,255,255,0.8); }
    #nav .brand { font-size:17px; letter-spacing:0.2em; color:rgba(255,255,255,0.9); }
    #nav .active { color:rgba(255,255,255,0.98); }
    #nav-links { display:flex; gap:28px; }

    /* MAIN WRAP */
    #wrap {
      position:relative; z-index:10;
      height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:80px 24px 40px;
    }

    #system { text-align:center; width:100%; max-width:580px; }

    /* STATUS */
    #status {
      font-size:13px; letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(255,255,255,0.45); margin-bottom:36px; min-height:18px;
      transition:color 0.4s, opacity 0.4s ease;
    }
    /* SCENARIO LABEL */
    #scenario-label {
      font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
      color:rgba(255,255,255,0.2); margin-bottom:24px; min-height:14px;
    }

    /* INPUTS */
    #inputs { text-align:left; display:inline-block; margin-bottom:32px; min-height:92px; }
    .input-row { font-size:15px; letter-spacing:0.08em; color:var(--dim); margin-bottom:12px; opacity:0; transition:opacity 0.3s; }
    .input-row.show { opacity:1; }
    .input-val { color:rgba(255,255,255,0.85); margin-left:8px; }

    /* RESULT */
    #result { min-height:90px; font-size:14px; letter-spacing:0.06em; line-height:2.2; }
    .r-blocked  { color:var(--red); font-size:18px; letter-spacing:0.14em; }
    .r-verified { color:var(--blue-b); font-size:18px; letter-spacing:0.14em; }
    .r-reason   { font-size:14px; color:rgba(255,255,255,0.65); letter-spacing:0.06em; }
    .r-risk     { font-size:13px; color:rgba(255,255,255,0.45); margin-top:12px; letter-spacing:0.1em; }

    /* AWARENESS */
    #awareness { margin-top:28px; font-size:14px; letter-spacing:0.08em; color:rgba(255,255,255,0.45); line-height:2.2; min-height:56px; }

    /* RESET */
    #reset-btn {
      display:none;
      margin-top:32px;
      font-family:var(--mono); font-size:10px; letter-spacing:0.2em; text-transform:uppercase;
      padding:10px 24px;
      border:1px solid rgba(255,255,255,0.1);
      background:transparent; color:rgba(255,255,255,0.3);
      cursor:pointer;
      transition:border-color 0.15s, color 0.15s;
    }
    #reset-btn:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.6); }

    /* FLASH */ 100%{background:transparent} } 100%{background:transparent} }

    /* STATUS LINE */
    #status-line {
      position:fixed; bottom:20px; left:40px;
      font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
      color:rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>

  <canvas id="gridCanvas"></canvas>
  <div id="overlay"></div>

  <nav id="nav">
    <a href="https://executia.io" class="brand">EXECUTIA</a>
    <div id="nav-links">
      <a href="https://executia.io">Entry</a>
      <a href="https://execution.executia.io" class="active">Execution</a>
      <a href="https://executia.io/institutional.html">Institutional</a>
    </div>
  </nav>

  <div id="wrap">
    <div id="system">

      <div id="status"></div>
      <!-- ENGINE OUTPUT (shown during run) -->
      <div id="scenario-label"></div>
      <div id="inputs" style="display:none">
        <div class="input-row" id="f0">BUDGET:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="input-val" id="v0">—</span></div>
        <div class="input-row" id="f1">TIME:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="input-val" id="v1">—</span></div>
        <div class="input-row" id="f2">RESOURCES:&nbsp;<span class="input-val" id="v2">—</span></div>
        <div class="input-row" id="f3">COMPLEXITY:&nbsp;<span class="input-val" id="v3">—</span></div>
      </div>
      <div id="result"></div>
      <div id="awareness"></div>
      

    </div>
  </div>

  <div id="status-line">EXECUTIA · EXECUTION LAYER</div>

  <script>
  /* ── CANVAS GRID + PARTICLES ─────────────────────────── */
  const canvas=document.getElementById("gridCanvas");
  const ctx=canvas.getContext("2d");
  let W,H,systemState="idle",constraints=[],particles=[];
  const G=40;

  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener("resize",resize); resize();

  function drawGrid(){
    ctx.strokeStyle="rgba(30,58,138,0.10)"; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=G){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=G){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  }

  function drawConstraints(){
    constraints.forEach(c=>{
      const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
      g.addColorStop(0,"rgba(220,38,38,0.3)"); g.addColorStop(1,"rgba(220,38,38,0)");
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="rgba(220,38,38,0.85)"; ctx.beginPath(); ctx.arc(c.x,c.y,3,0,Math.PI*2); ctx.fill();
    });
  }

  let time=0;
  class Particle{
    constructor(idx){this.idx=idx;this.reset();}
    reset(){
      this.x=Math.random()*W; this.y=Math.random()*H;
      this.tx=this.x; this.ty=this.y;
      if(Math.random()>0.5){this.vx=(Math.random()>0.5?1:-1)*1.8;this.vy=0;}
      else{this.vx=0;this.vy=(Math.random()>0.5?1:-1)*1.8;}
      this.life=0; this.maxLife=90+Math.random()*130;
    }
    update(){
      if(systemState==="error"){
        this.vx*=0.93; this.vy*=0.93; this.x+=this.vx; this.y+=this.vy;
        for(let c of constraints){
          const dx=this.x-c.x,dy=this.y-c.y;
          if(Math.sqrt(dx*dx+dy*dy)<c.r){this.vx=0;this.vy=0;return;}
        }
        return;
      }
      const baseSpeed = systemState==="locked" ? 0.25 : 1.8;
      const variance = Math.sin(time*0.001+this.idx)*0.4;
      const s = (systemState==="success"?2.2:systemState==="locked"?0.2:1)*(baseSpeed+variance)/baseSpeed;
      // organic drift
      const driftX=Math.sin(time*0.0008+this.idx*0.7)*0.12;
      const driftY=Math.cos(time*0.0008+this.idx*0.5)*0.12;
      this.tx+=this.vx*s+driftX;
      this.ty+=this.vy*s+driftY;
      // smooth interpolation
      this.x+=(this.tx-this.x)*0.08;
      this.y+=(this.ty-this.y)*0.08;
      this.x=Math.round(this.x/G)*G; this.y=Math.round(this.y/G)*G;
      this.life++;
      if(this.x<0||this.x>W||this.y<0||this.y>H||this.life>this.maxLife)this.reset();
    }
    draw(){
      const alpha=systemState==="error"?0.8:
                  systemState==="success"?(0.7+Math.sin(time*0.002+this.idx)*0.2):
                  (0.35+Math.sin(time*0.0015+this.idx)*0.12);
      ctx.fillStyle=systemState==="error"?`rgba(220,38,38,${alpha})`:
                    `rgba(59,130,246,${alpha})`;
      ctx.beginPath();ctx.arc(this.x,this.y,2,0,Math.PI*2);ctx.fill();
    }
  }
  for(let i=0;i<80;i++)particles.push(new Particle());
  (function loop(){
    time++;
    ctx.fillStyle="rgba(5,7,15,0.18)"; ctx.fillRect(0,0,W,H); drawGrid();
    if(systemState==="error")drawConstraints();
    particles.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(loop);
  })();

  /* ── SCENARIOS ───────────────────────────────────────── */
  const SCENARIOS=[
    {key:"authorized",  label:"STATE-LEVEL PAYMENT SYSTEM",       B:200,T:90,R:100,C:70,  layers:[]},
    {key:"unauthorized",label:"UNAUTHORIZED ACTION DETECTED",        B:200,T:90,R:100,C:70,  layers:["Authorization not confirmed","No mandate for execution scope"]},
    {key:"budget",      label:"BUDGET THRESHOLD EXCEEDED",  B:60, T:90,R:100,C:95,  layers:["Budget insufficient","Execution capacity exceeded"]},
  ];

  /* ── UI REFS ─────────────────────────────────────────── */
  const $status=document.getElementById("status");
  const $sl=document.getElementById("scenario-label");
  const $inp=document.getElementById("inputs");
  const $re=document.getElementById("result");
  const $aw=document.getElementById("awareness");
  const vEls=[0,1,2,3].map(i=>document.getElementById("v"+i));
  const fEls=[0,1,2,3].map(i=>document.getElementById("f"+i));

  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  function setStatus(t,c){$status.textContent=t;$status.style.color=c||"rgba(255,255,255,0.28)";}

  /* ── RUN SCENARIO ────────────────────────────────────── */
  async function runScenario(s){
    systemState="idle"; constraints=[]; $re.innerHTML=""; $aw.innerHTML="";
    $sl.textContent=s.label;
    $inp.style.display="block";
    fEls.forEach(f=>f.classList.remove("show")); vEls.forEach(v=>v.textContent="—");

    setStatus("INPUT REGISTERED");
    const keys=["B","T","R","C"];
    for(let i=0;i<4;i++){await delay(220);fEls[i].classList.add("show");vEls[i].textContent=s[keys[i]];}

    await delay(600);
    setStatus("VALIDATION IN PROGRESS");
    await delay(900);

    const failed=s.layers;
    const risk=(s.C/(s.R*s.T||1)*100).toFixed(1);

    if(failed.length>0){
      systemState="error";
      failed.forEach((f,i)=>constraints.push({
        x:Math.round((0.2+Math.random()*0.6)*W/G)*G,
        y:Math.round((0.2+Math.random()*0.6)*H/G)*G, r:55+i*25
      }));
      document.getElementById('overlay').style.background='rgba(220,38,38,0.07)';
      document.getElementById('overlay').style.opacity='1';
      await delay(600);
      document.getElementById('overlay').style.opacity='0';
      await delay(200);
      $re.innerHTML=`<div class="r-blocked">SYSTEM BLOCKED</div>`
        +failed.map(f=>`<div class="r-reason">${f}</div>`).join("")
        +`<div class="r-reason">Execution denied</div>`;
      setStatus("BLOCKED","rgba(220,38,38,0.6)");
    } else {
      systemState="success";
      document.getElementById('overlay').style.background='rgba(37,99,235,0.07)';
      document.getElementById('overlay').style.opacity='1';
      await delay(600);
      document.getElementById('overlay').style.opacity='0';
      await delay(200);
      $re.innerHTML=`<div class="r-verified">EXECUTION VERIFIED</div>
        <div class="r-reason">All conditions satisfied</div>
        <div class="r-reason">Proceed</div>`;
      setStatus("VERIFIED","rgba(59,130,246,0.7)");
    }

    await delay(2000);
    const riskLevel = parseFloat(risk) > 60 ? 'HIGH' : parseFloat(risk) > 30 ? 'ELEVATED' : 'LOW';
    $re.innerHTML+=`<div class="r-risk">RISK LEVEL: ${riskLevel}</div>`;
    await delay(4000);

    systemState="locked";
    $aw.innerHTML="This is not an interface";
    await delay(1600);
    $aw.innerHTML+="<br>This is a protocol layer";
    await delay(1600);
    $aw.innerHTML+="<br>Execution is validated before outcome";
    await delay(2400);
    $aw.innerHTML+="<br><br>Execution without verification";
    await delay(1000);
    $aw.innerHTML+="<br>will not be permitted";
    await delay(5000);

    $aw.innerHTML=""; $re.innerHTML=""; systemState="idle"; constraints=[];
    $status.style.opacity='0';
    await delay(400);
    $status.textContent=''; $status.style.opacity='1';
    $sl.textContent='';
    await delay(600);
  }

  /* ── AUTO-RUN LOOP ───────────────────────────────────── */
  let idx=0;
  async function autoLoop(){
    while(true){
      await runScenario(SCENARIOS[idx]);
      idx=(idx+1)%SCENARIOS.length;
      await delay(1800);
    }
  }

  /* ── BOOT ────────────────────────────────────────────── */
  async function boot(){
    setStatus("SYSTEM INITIALIZING"); await delay(1100);
    setStatus("EXECUTION LAYER ACTIVE"); await delay(900);
    setStatus(""); await delay(500);
    autoLoop();
  }
  // Soft pause on attention
  let hoverTimeout;
  document.addEventListener("mousemove", () => {
    if(systemState==="idle"||systemState==="processing") return;
    if(systemState!=="locked") {
      systemState="locked";
    }
    clearTimeout(hoverTimeout);
    hoverTimeout=setTimeout(()=>{
      if(systemState==="locked") systemState="idle";
    }, 2500);
  });

  boot();
  </script>
