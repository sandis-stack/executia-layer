<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EXECUTIA Engine</title>
  <meta
    name="description"
    content="EXECUTIA Engine — execution control, validation and registry."
  />

  <meta http-equiv="refresh" content="0; url=/dashboard" />

  <link rel="canonical" href="https://execution.executia.io/dashboard" />

  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f6f8fa;
      --border: #e5e7eb;
      --blue: #1e3a5f;
      --text: #1f2937;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      padding: 34px;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      border: 1px solid var(--blue);
      background: var(--blue);
      color: #ffffff;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      background: #294d78;
    }
  </style>
</head>

<body>
  <main class="shell">
    <div class="label">EXECUTIA ENGINE</div>
    <h1>Redirecting to Execution Status Engine.</h1>
    <p>
      If the redirect does not start automatically, enter the EXECUTIA Engine manually.
    </p>
    <a href="/dashboard">Enter Engine</a>
  </main>

  <script>
    window.location.replace("/dashboard");
  </script>
</body>
</html>
