<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXECUTIA™ | Execution System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #0A1F44;
    color: #e5e7eb;
    font-family: 'Inter', system-ui, sans-serif;
}

.system-box {
    border: 1px solid #374151;
    background: rgba(255,255,255,0.02);
    padding: 24px;
}

.input {
    border-bottom: 1px solid #4b5563;
    background: transparent;
    padding: 8px 4px;
    width: 100%;
}

.label {
    font-size: 11px;
    color: #9ca3af;
    letter-spacing: 0.15em;
}

.divider {
    border-top: 1px solid #374151;
    margin: 24px 0;
}

.red { color: #dc2626; }
.green { color: #16a34a; }
</style>
</head>

<body>

<!-- HEADER -->
<header class="border-b border-gray-700">
  <div class="max-w-6xl mx-auto px-6 flex justify-between items-center h-[70px]">

    <div class="text-[13px] tracking-[0.14em] text-gray-300">
      EXECUTIA™
    </div>

    <nav class="flex gap-8 text-[12px] tracking-widest text-gray-400">

      <a href="https://executia.io">ENTRY</a>

      <a href="https://execution.executia.io" class="text-white">
        EXECUTION
      </a>

      <a href="https://executia.io/institutional">
        INSTITUTIONAL
      </a>

    </nav>

  </div>
</header>

<!-- CONTENT -->
<div class="max-w-6xl mx-auto px-6 py-20">

<h1 class="text-2xl mb-2">Execution System</h1>
<p class="text-gray-400 mb-12 text-sm">
System-level validation and enforcement
</p>

<div class="system-box mb-16">

<!-- SESSION -->
<div class="flex justify-between text-xs text-gray-400 mb-6">
  <span id="session">SESSION: —</span>
  <span id="timestamp">TIME: —</span>
  <span id="state">STATE: IDLE</span>
</div>

<div class="grid md:grid-cols-2 gap-12">

<!-- INPUT -->
<div>
<p class="label mb-6">INPUT</p>

<input id="budget" placeholder="Budget" class="input mb-5">
<input id="time" placeholder="Time" class="input mb-5">
<input id="resources" placeholder="Resources" class="input mb-5">
<input id="complexity" placeholder="Complexity" class="input mb-5">
<input id="dependency" placeholder="Dependency" class="input mb-5">

<button onclick="runSystem()" class="text-xs tracking-widest mt-6">
EXECUTE
</button>
</div>

<!-- OUTPUT -->
<div>
<p class="label mb-6">SYSTEM LOG</p>

<div id="log" class="text-sm space-y-2 text-gray-300"></div>

<div class="divider"></div>

<p class="label mb-2">RESULT</p>
<div id="result" class="text-lg"></div>

<div class="divider"></div>

<p class="label mb-4">SCENARIO</p>
<div id="comparison" class="text-sm text-gray-300 space-y-4"></div>

</div>

</div>
</div>

<!-- FINAL STATUS -->
<div class="max-w-6xl mx-auto px-6 pb-16">
  <p class="text-gray-500 text-xs tracking-wide">
    STATUS: NON-OPTIONAL
  </p>
</div>

</div>

<script>
function generateSession() {
    return "EXE-" + Math.floor(10000 + Math.random() * 90000);
}

function getTimestamp() {
    const now = new Date();
    return now.toISOString().replace("T", " ").substring(0, 19);
}

async function runSystem() {

    const log = document.getElementById("log");
    const result = document.getElementById("result");
    const state = document.getElementById("state");
    const comp = document.getElementById("comparison");

    const sessionEl = document.getElementById("session");
    const timeEl = document.getElementById("timestamp");

    log.innerHTML = "";
    result.innerHTML = "";
    comp.innerHTML = "";

    const sessionId = generateSession();
    const timestamp = getTimestamp();

    sessionEl.innerHTML = "SESSION: " + sessionId;
    timeEl.innerHTML = "TIME: " + timestamp;
    state.innerHTML = "STATE: PROCESSING";

    const payload = {
        budget: Number(budget.value || 0),
        time: Number(time.value || 0),
        resources: Number(resources.value || 0),
        complexity: Number(complexity.value || 0),
        dependency: Number(dependency.value || 0)
    };

    function logLine(text, delay) {
        setTimeout(() => {
            log.innerHTML += "<div>" + text + "</div>";
        }, delay);
    }

    logLine("INPUT RECEIVED", 200);
    logLine("VALIDATION RUNNING", 600);

    try {
        const response = await fetch("/api/validate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        logLine("SYSTEM RESPONSE RECEIVED", 1000);
        logLine("RISK LEVEL: " + data.result.risk + "%", 1200);
        logLine("FAILURE COST: €" + data.result.cost, 1400);
        logLine("VALIDATION COMPLETE", 1600);

        setTimeout(() => {

            if (data.result.status === "SYSTEM BLOCKED") {
                result.innerHTML = '<span class="red">SYSTEM BLOCKED</span>';
            } else {
                result.innerHTML = '<span class="green">EXECUTION VERIFIED</span>';
            }

            state.innerHTML = "STATE: ENFORCED";

            const rawRisk = Math.min(
                95,
                (payload.complexity * 8) +
                (payload.dependency * 6) +
                (1000 / (payload.resources + 1))
            );

            const rawCost = Math.round(rawRisk * payload.budget * 0.2);

            comp.innerHTML = `
            <div>
              <div class="text-gray-500">WITHOUT EXECUTION CONTROL</div>
              <div>RISK: ${Math.round(rawRisk)}%</div>
              <div>SYSTEM LOSS: €${rawCost}</div>
            </div>

            <div class="pt-2 border-t border-gray-700">
              <div class="text-gray-500">WITH EXECUTIA</div>
              <div>RISK: ~0%</div>
              <div>SYSTEM LOSS: €0</div>
            </div>
            `;

        }, 1700);

    } catch (e) {
        result.innerHTML = '<span class="red">SYSTEM BLOCKED</span>';
        state.innerHTML = "STATE: FAILURE";
    }
}
</script>

</body>
</html>
