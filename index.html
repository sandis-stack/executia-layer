<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execution Layer — EXECUTIA</title>

<style>
:root {
  --blue: #0A2540;
  --light-blue: #E6F0FA;
  --green: #16A34A;
  --gray: #4B5563;
}

body {
  font-family: Inter, system-ui, sans-serif;
  background: #fff;
  color: var(--blue);
  margin: 0;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #eee;
}

a {
  text-decoration: none;
  color: var(--blue);
  margin-left: 20px;
}

/* SECTION */
section {
  max-width: 1000px;
  margin: 0 auto;
  padding: 100px 20px;
  text-align: center;
}

/* FLOW */
.flow {
  font-size: 28px;
  margin: 40px 0;
  transition: all 0.4s ease;
}

/* BROKEN STYLE */
.broken {
  letter-spacing: 2px;
  color: var(--gray);
}

/* CLEAN */
.clean {
  color: var(--blue);
}

/* TOGGLE */
.toggle {
  margin-top: 40px;
}

button {
  padding: 14px 28px;
  background: var(--blue);
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

/* COMPONENTS */
.components {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 60px;
  opacity: 0;
  transition: opacity 0.5s;
}

.components div {
  border-top: 2px solid var(--blue);
  padding-top: 10px;
}

/* ACTIVE */
.active {
  opacity: 1;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 60px;
  border-top: 1px solid #eee;
  font-size: 14px;
  color: var(--gray);
}

</style>
</head>

<body>

<header>
  <div><strong>EXECUTIA</strong></div>
  <div>
    <a href="/">Home</a>
    <a href="/institutional">Institutional</a>
    <a href="/request">Request</a>
  </div>
</header>

<section>

<h1>Execution Layer</h1>
<p>See what happens between plan and result.</p>

<div id="flow" class="flow broken">
  PLAN → chaos → delay → failure → RESULT
</div>

<div class="toggle">
  <button onclick="toggleExec()">Activate EXECUTIA</button>
</div>

<div id="components" class="components">
  <div>
    <h3>STRUCTURE</h3>
    <p>Defined system</p>
  </div>
  <div>
    <h3>CONTROL</h3>
    <p>Execution stability</p>
  </div>
  <div>
    <h3>CONTINUITY</h3>
    <p>No breakdown</p>
  </div>
</div>

</section>

<footer>
  EXECUTIA — Execution Layer System
</footer>

<script>
let active = false;

function toggleExec() {
  const flow = document.getElementById("flow");
  const components = document.getElementById("components");

  active = !active;

  if (active) {
    flow.innerHTML = "PLAN → EXECUTIA → RESULT";
    flow.classList.remove("broken");
    flow.classList.add("clean");
    components.classList.add("active");
  } else {
    flow.innerHTML = "PLAN → chaos → delay → failure → RESULT";
    flow.classList.add("broken");
    flow.classList.remove("clean");
    components.classList.remove("active");
  }
}
</script>

</body>
</html>
