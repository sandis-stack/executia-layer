
<!doctype html><html><head><meta charset="utf-8"><title>EXECUTIA Login</title><style>body{font-family:Arial,sans-serif;background:#f7f9fc;color:#0a1f44;padding:40px}form{max-width:360px;background:#fff;border:1px solid #dbe3f0;padding:24px}.row{margin-bottom:12px}input,button{width:100%;padding:10px}button{background:#0a1f44;color:#fff;border:0}</style></head><body><h1>EXECUTIA Operator Login</h1><form id="login"><div class="row"><input id="org" placeholder="Organization ID"></div><div class="row"><input id="email" placeholder="Email"></div><div class="row"><input id="password" type="password" placeholder="Password"></div><button type="submit">Login</button><p id="msg"></p></form><script>document.getElementById('login').addEventListener('submit', async (e)=>{e.preventDefault();const r=await fetch('/api/v1/auth-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({organizationId:org.value,email:email.value,password:password.value})});const j=await r.json();if(!r.ok){msg.textContent=j.error_message||'Login failed';return;}localStorage.setItem('executia_session_token',j.token);localStorage.setItem('executia_org',org.value);location.href='/console/';});</script></body></html>
