
<!doctype html><html><head><meta charset="utf-8"><title>EXECUTIA Audit</title><style>body{font-family:Arial,sans-serif;background:#fff;color:#0a1f44;padding:24px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #dbe3f0;padding:8px;text-align:left}</style></head><body><h1>Audit Log</h1><table><thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table><script>async function load(){const token=localStorage.getItem('executia_session_token');const org=localStorage.getItem('executia_org');const r=await fetch('/api/v1/audit?limit=50',{headers:{authorization:'Bearer '+token,'x-organization-id':org}});const j=await r.json();const rows=document.getElementById('rows');(j.items||[]).forEach(it=>{const tr=document.createElement('tr');[it.created_at,it.actor_label||it.actor_id||'',it.action,it.entity,it.status].forEach(v=>{const td=document.createElement('td');td.textContent=v||'';tr.appendChild(td);});rows.appendChild(tr);});}load();</script></body></html>
