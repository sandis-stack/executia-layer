<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXECUTIA Dashboard</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f6f9fc; color:#0A2540; }
    header { padding:28px 36px; border-bottom:1px solid #d9e4f2; background:#fff; }
    h1 { margin:0; font-size:30px; }
    .sub { color:#667085; margin-top:6px; }
    .wrap { padding:28px 36px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    .card { background:#fff; border:1px solid #d9e4f2; border-radius:18px; padding:20px; box-shadow:0 8px 24px rgba(10,37,64,.06); }
    .label { font-size:12px; letter-spacing:.14em; color:#667085; text-transform:uppercase; }
    .value { font-size:28px; font-weight:800; margin-top:12px; }
    .ok { color:#16803a; }
    .bad { color:#c62828; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th,td { padding:12px; border-bottom:1px solid #e5edf7; text-align:left; font-size:14px; }
    th { color:#667085; text-transform:uppercase; font-size:11px; letter-spacing:.12em; }
    code { font-size:12px; word-break:break-all; }
    button { background:#0A2540; color:white; border:0; border-radius:12px; padding:12px 18px; font-weight:700; cursor:pointer; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  </style>
</head>

<body>
<header>
  <h1>EXECUTIA Dashboard</h1>
  <div class="sub">Execution visibility — decision, ledger, proof.</div>
</header>

<div class="wrap">
  <div class="top">
    <strong>System overview</strong>
    <button onclick="loadDashboard()">Refresh</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">System</div>
      <div id="status" class="value">—</div>
    </div>

    <div class="card">
      <div class="label">Total executions</div>
      <div id="total" class="value">—</div>
    </div>

    <div class="card">
      <div class="label">Approved</div>
      <div id="approved" class="value">—</div>
    </div>

    <div class="card">
      <div class="label">Blocked / Escalated</div>
      <div id="blocked" class="value">—</div>
    </div>
  </div>

  <div class="card">
    <div class="label">Latest execution</div>

    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Decision</th>
          <th>Status</th>
          <th>Event</th>
          <th>Hash</th>
        </tr>
      </thead>

      <tbody id="rows">
        <tr>
          <td colspan="5">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API_BASE = "https://execution.executia.io/api/v1";

async function safeJson(url) {
  const response = await fetch(url, {
    method: "GET",
    headers: {
      "Accept": "application/json"
    }
  });

  if (!response.ok) {
    throw new Error(url + " failed: " + response.status);
  }

  return response.json();
}

function decisionOf(item) {
  return item.ledger_decision || item.decision || item.payload?.decision || "—";
}

function statusOf(item) {
  return item.authoritative_status || item.execution_status || item.status || "—";
}

function hashOf(item) {
  return item.truth_hash || item.payload?.truth_hash || "—";
}

function eventOf(item) {
  return item.event_type || item.payload?.ledger?.event_type || "—";
}

function createdOf(item) {
  return item.created_at || item.execution?.created_at || null;
}

async function loadDashboard() {
  const statusEl = document.getElementById("status");
  const rowsEl = document.getElementById("rows");

  try {
    const health = await safeJson(API_BASE + "/health");

    statusEl.textContent = health.status || "healthy";
    statusEl.className = "value ok";
  } catch (err) {
    statusEl.textContent = "offline";
    statusEl.className = "value bad";
  }

  try {
    const result = await safeJson(API_BASE + "/executions");

    const executions = Array.isArray(result)
      ? result
      : result.executions || result.data || [];

    document.getElementById("total").textContent = executions.length;

    const approved = executions.filter((item) => decisionOf(item) === "APPROVE").length;

    const blocked = executions.filter((item) =>
      ["BLOCK", "ESCALATE"].includes(decisionOf(item))
    ).length;

    document.getElementById("approved").textContent = approved;
    document.getElementById("blocked").textContent = blocked;

    if (!executions.length) {
      rowsEl.innerHTML = `<tr><td colspan="5">No executions yet.</td></tr>`;
      return;
    }

    rowsEl.innerHTML = executions.slice(0, 20).map((item) => {
      const created = createdOf(item);
      const when = created ? new Date(created).toLocaleString() : "—";

      return `
        <tr>
          <td>${when}</td>
          <td><strong>${decisionOf(item)}</strong></td>
          <td>${statusOf(item)}</td>
          <td>${eventOf(item)}</td>
          <td><code>${hashOf(item)}</code></td>
        </tr>
      `;
    }).join("");

  } catch (err) {
    rowsEl.innerHTML = `
      <tr>
        <td colspan="5">Executions unavailable: ${err.message}</td>
      </tr>
    `;
  }
}

loadDashboard();
</script>
</body>
</html>
