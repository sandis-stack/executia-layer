<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EXECUTIA Dashboard V3</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f9fc;
  margin: 0;
  padding: 40px;
  color: #0A2540;
}

h1 { margin: 0 0 5px; }

.sub {
  color: #667085;
  margin-bottom: 18px;
}

.mode {
  margin-bottom: 24px;
  font-weight: 800;
  color: green;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 26px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 24px;
}

.card {
  background: #fff;
  border: 1px solid #d9e4f2;
  border-radius: 14px;
  padding: 20px;
}

.label {
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #667085;
  margin-bottom: 8px;
}

.value {
  font-size: 24px;
  font-weight: 800;
}

.online { color: green; }
.offline { color: #c62828; }
.review { color: #b45309; }

button {
  background: #0A2540;
  color: white;
  border: none;
  padding: 11px 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-left: 8px;
  font-weight: 700;
}

button.secondary {
  background: white;
  color: #0A2540;
  border: 1px solid #d9e4f2;
}

button.danger {
  background: #c62828;
}

button:disabled {
  opacity: .55;
  cursor: not-allowed;
}

select {
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #d9e4f2;
  color: #0A2540;
  font-weight: 700;
  background: white;
}

.layout {
  display: grid;
  grid-template-columns: 1.25fr .75fr;
  gap: 20px;
}

.panel {
  background: #fff;
  border: 1px solid #d9e4f2;
  border-radius: 14px;
  overflow: hidden;
}

.panel-title {
  padding: 16px 18px;
  border-bottom: 1px solid #eef2f7;
  font-weight: 800;
}

.row {
  display: grid;
  grid-template-columns: 180px 150px 140px 1fr;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.row:hover { background: #f8fbff; }

.header {
  background: #f0f3f8;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #667085;
  font-weight: 800;
  cursor: default;
}

.status-approved { color: green; font-weight: 800; }
.status-blocked { color: #c62828; font-weight: 800; }
.status-review { color: #b45309; font-weight: 800; }

.detail {
  padding: 18px;
}

.actions {
  margin-bottom: 14px;
}

pre {
  background: #f6f9fc;
  border: 1px solid #d9e4f2;
  border-radius: 10px;
  padding: 14px;
  white-space: pre-wrap;
  overflow: auto;
  max-height: 440px;
  font-size: 12px;
}

.live-dot {
  display: inline-block;
  width: 9px;
  height: 9px;
  background: green;
  border-radius: 50%;
  margin-right: 8px;
}

code { font-size: 12px; }
</style>
</head>

<body>

<div class="top">
  <div>
    <h1>EXECUTIA Dashboard V3</h1>
    <div class="sub">Live stream · decision control · truth registry</div>
    <div class="mode">Execution control mode: ACTIVE</div>
  </div>

  <div>
    <button class="secondary" onclick="loadData()">Refresh</button>
    <button id="runBtn" onclick="runTestExecution()">Run execution</button>
  </div>
</div>

<div class="cards">
  <div class="card">
    <div class="label">System</div>
    <div id="systemStatus" class="value offline">checking</div>
  </div>

  <div class="card">
    <div class="label">Total executions</div>
    <div id="total" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">Approved</div>
    <div id="approved" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">Review / blocked</div>
    <div id="blocked" class="value">—</div>
  </div>
</div>

<div style="margin-bottom:20px;">
  <select id="filter" onchange="renderStream()">
    <option value="ALL">All</option>
    <option value="APPROVED">Approved</option>
    <option value="BLOCKED">Blocked</option>
    <option value="REQUIRES_REVIEW">Requires Review</option>
  </select>
</div>

<div class="layout">
  <div class="panel">
    <div class="panel-title"><span class="live-dot"></span>Live execution stream</div>

    <div class="row header">
      <div>When</div>
      <div>Decision</div>
      <div>Event</div>
      <div>Proof</div>
    </div>

    <div id="stream"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Execution detail</div>

    <div class="detail">
      <div class="actions">
        <button onclick="forceApprove()">Force approve</button>
        <button class="danger" onclick="blockExecution()">Block</button>
      </div>

      <pre id="detail">Select an execution from the stream.</pre>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://execution.executia.io";

let loading = false;
let items = [];
let filteredItems = [];
let selectedExecution = null;

function getDecision(e) {
  return e.decision || e.ledger_decision || e.result_status || e.status || "UNKNOWN";
}

function getStatus(e) {
  return e.status || e.authoritative_status || e.ticket_status_cache || e.result_status || "UNKNOWN";
}

function getEvent(e) {
  return e.event_type || e.payment_type || e.source || e.payload?.event_type || e.payload?.context?.source || "execution";
}

function getHash(e) {
  return e.truth_hash || e.payload?.truth_hash || e.execution_id || e.request_id || e.ticket_id || "";
}

function statusClass(d) {
  if (d === "APPROVED" || d === "APPROVE") return "status-approved";
  if (d === "BLOCKED" || d === "BLOCK") return "status-blocked";
  return "status-review";
}

function getRisk(e) {
  const amount = Number(e.budget || e.payload?.amount || 0);
  const decision = getDecision(e);

  if (decision === "BLOCKED" || decision === "BLOCK") return "HIGH";
  if (decision === "REQUIRES_REVIEW") return "REVIEW";
  if (amount > 10000) return "HIGH";
  return "NORMAL";
}

function getMeaning(decision) {
  if (decision === "APPROVED" || decision === "APPROVE") return "execution passed";
  if (decision === "BLOCKED" || decision === "BLOCK") return "prevented";
  if (decision === "REQUIRES_REVIEW") return "human needed";
  return "unknown state";
}

async function getJson(url, options = {}) {
  const res = await fetch(url, {
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    ...options
  });

  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch {
    throw new Error("NON_JSON_RESPONSE");
  }
}

async function loadData() {
  if (loading) return;
  loading = true;

  try {
    const health = await getJson(`${API_BASE}/api/v1/health`);
    const system = document.getElementById("systemStatus");

    if (health.ok && health.status === "healthy") {
      system.innerText = "online";
      system.className = "value online";
    } else {
      system.innerText = "degraded";
      system.className = "value review";
    }

    const data = await getJson(`${API_BASE}/api/v1/executions`);

    if (!data.ok) throw new Error(data.error || "API_ERROR");

    items = data.executions || [];

    document.getElementById("total").innerText = items.length;

    const approvedCount = items.filter(e => {
      const d = getDecision(e);
      return d === "APPROVED" || d === "APPROVE";
    }).length;

    document.getElementById("approved").innerText = approvedCount;
    document.getElementById("blocked").innerText = items.length - approvedCount;

    renderStream();

  } catch (err) {
    document.getElementById("systemStatus").innerText = "offline";
    document.getElementById("systemStatus").className = "value offline";
    document.getElementById("stream").innerHTML =
      `<div class="row"><div>Error</div><div>${err.message}</div></div>`;
  } finally {
    loading = false;
  }
}

function renderStream() {
  const filter = document.getElementById("filter").value;
  const stream = document.getElementById("stream");

  filteredItems = items;

  if (filter !== "ALL") {
    filteredItems = items.filter(e => getDecision(e) === filter);
  }

  if (!filteredItems.length) {
    stream.innerHTML = `<div class="row"><div>No executions for this filter.</div></div>`;
    document.getElementById("detail").textContent = "No execution selected.";
    return;
  }

  stream.innerHTML = filteredItems.slice(0, 40).map((e, i) => {
    const d = getDecision(e);
    const h = getHash(e);
    const isNew = i === 0 ? "background:#e6f4ff;" : "";

    return `
      <div class="row" style="${isNew}" onclick="showDetail(${i})">
        <div>${e.created_at || "—"}</div>
        <div class="${statusClass(d)}">${d}</div>
        <div>${getEvent(e)}</div>
        <div><code>${h ? h.substring(0, 18) : "-"}</code></div>
      </div>
    `;
  }).join("");

  stream.scrollTop = 0;
  showDetail(0);
}

function showDetail(index) {
  const e = filteredItems[index];
  if (!e) return;

  selectedExecution = e;
  const decision = getDecision(e);

  document.getElementById("detail").textContent = JSON.stringify({
    decision,
    meaning: getMeaning(decision),
    status: getStatus(e),
    risk: getRisk(e),
    reason: e.reason || e.payload?.reason || null,
    source: getEvent(e),
    authorized: e.authorized ?? null,
    hold_pending: e.hold_pending ?? null,
    execution_id: e.execution_id || null,
    truth_hash: e.truth_hash || e.payload?.truth_hash || null,
    created_at: e.created_at || null,
    payload: e.payload || null
  }, null, 2);
}

function forceApprove() {
  if (!selectedExecution) {
    alert("No execution selected.");
    return;
  }

  alert(
    "Override action queued for: " +
    (selectedExecution.execution_id || selectedExecution.id || "unknown") +
    "\nNext step: connect override API."
  );
}

function blockExecution() {
  if (!selectedExecution) {
    alert("No execution selected.");
    return;
  }

  alert(
    "Block action queued for: " +
    (selectedExecution.execution_id || selectedExecution.id || "unknown") +
    "\nNext step: connect block API."
  );
}

async function runTestExecution() {
  const btn = document.getElementById("runBtn");

  try {
    btn.disabled = true;
    btn.innerText = "Running...";

    const scenarios = [
      { amount: 100, legalBlock: false },
      { amount: 15000, legalBlock: false },
      { amount: 0, legalBlock: false },
      { amount: 500, legalBlock: true }
    ];

    const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];

    const data = await getJson(`${API_BASE}/api/v1/execute`, {
      method: "POST",
      body: JSON.stringify({
        organization_id: "org_norsteel",
        session_id: "dashboard_v3_" + Date.now(),
        project_id: "dashboard_v3",
        event_type: "payment",
        amount: scenario.amount,
        currency: "EUR",
        context: {
          source: "dashboard_v3",
          legalBlock: scenario.legalBlock
        }
      })
    });

    if (data.ok === false) {
      alert(data.error || "Execution failed");
      return;
    }

    await loadData();

  } catch (err) {
    alert(err.message || "Execution failed");
  } finally {
    btn.disabled = false;
    btn.innerText = "Run execution";
  }
}

loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
