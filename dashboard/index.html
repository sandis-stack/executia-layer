<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EXECUTIA Control Interface</title>

<style>
:root{
  --blue:#0A2540;
  --line:#d9e4f2;
  --soft:#f7f9fc;
  --muted:#667085;
  --green:#15803d;
  --orange:#b45309;
  --red:#991b1b;
  --redSoft:#fff1f2;
  --greenSoft:#ecfdf3;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:26px;
  font-family:Arial,sans-serif;
  background:var(--soft);
  color:var(--blue);
  border-top:5px solid var(--green);
  font-size:12px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:16px;
}

h1{
  margin:0;
  font-size:20px;
}

.sub{
  font-size:11px;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:8px;
}

button{
  padding:8px 12px;
  font-size:11px;
  font-weight:800;
  border-radius:8px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
}

button.primary{
  background:var(--blue);
  color:#fff;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:12px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 14px;
}

.label{
  font-size:8px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
  font-weight:900;
}

.value{
  font-size:13px;
  font-weight:800;
}

.ok{color:var(--green)}
.bad{color:var(--red)}
.review{color:var(--orange)}

.layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:14px;
}

.stream{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}

.row{
  display:grid;
  grid-template-columns:160px 120px 1fr;
  padding:8px 0;
  border-bottom:1px solid #eef2f7;
  font-size:11px;
  cursor:pointer;
}

.row:hover{
  background:#f4f8fc;
}

.right{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
}

pre{
  background:#0f172a;
  color:#fff;
  padding:12px;
  border-radius:10px;
  font-size:10px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="top">
  <div>
    <h1>EXECUTIA Control Interface</h1>
    <div class="sub">Live execution · Control · Truth registry</div>
  </div>

  <div class="actions">
    <!-- FIXED -->
    <button onclick="window.location.href='/console/'">Console</button>
    <button onclick="load()">Refresh</button>
    <button class="primary" onclick="run()">Run control</button>
  </div>
</div>

<div class="grid">
  <div class="card">
    <div class="label">System</div>
    <div id="system" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">Executions</div>
    <div id="total" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">Approved</div>
    <div id="approved" class="value ok">—</div>
  </div>

  <div class="card">
    <div class="label">Review / Blocked</div>
    <div id="blocked" class="value review">—</div>
  </div>
</div>

<div class="layout">
  <div class="stream">
    <div class="label">Live execution stream</div>
    <div id="stream"></div>
  </div>

  <div class="right">
    <div class="label">Execution inspector</div>

    <button class="primary" onclick="override('APPROVE')">Force approve</button>
    <button onclick="override('BLOCK')">Block</button>
    <button onclick="override('REVIEW')">Review</button>

    <pre id="detail">No execution selected</pre>
  </div>
</div>

<script>
const API="https://execution.executia.io/api/v1";
const STREAM="/api/v1/stream";

let items=[];
let selected=null;

function decision(e){
  return e.status||e.result_status||e.decision||"UNKNOWN";
}

function load(){
  fetch(API+"/executions?limit=50")
    .then(r=>r.json())
    .then(d=>{
      items=d.executions||[];
      render();
      stats();
    });
}

function stats(){
  document.getElementById("system").textContent="ACTIVE";
  document.getElementById("total").textContent=items.length;

  let ok=0;
  items.forEach(e=>{
    if(decision(e)==="APPROVED") ok++;
  });

  document.getElementById("approved").textContent=ok;
  document.getElementById("blocked").textContent=items.length-ok;
}

function render(){
  const el=document.getElementById("stream");

  el.innerHTML=items.slice(0,25).map((e,i)=>{
    return `
    <div class="row" onclick="select(${i})">
      <div>${e.created_at||""}</div>
      <div><b>${decision(e)}</b></div>
      <div>${e.execution_id||""}</div>
    </div>`;
  }).join("");
}

function select(i){
  selected=items[i];
  document.getElementById("detail").textContent=
    JSON.stringify(selected,null,2);
}

function override(action){
  if(!selected) return;

  fetch(API+"/override",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      execution_id:selected.execution_id,
      action
    })
  })
  .then(()=>load());
}

function run(){
  fetch(API+"/execute",{method:"POST"});
}

function startStream(){
  const es=new EventSource(STREAM);

  es.addEventListener("execution",(e)=>{
    const d=JSON.parse(e.data);
    items=d.executions||[];
    render();
    stats();
  });

  es.addEventListener("change",(e)=>{
    const d=JSON.parse(e.data);
    load();
  });
}

load();
startStream();
</script>

</body>
</html>
