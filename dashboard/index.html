<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXECUTIA Dashboard</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f6f9fc; color:#0A2540; }
    header { padding:28px 36px; border-bottom:1px solid #d9e4f2; background:#fff; }
    h1 { margin:0; font-size:30px; }
    .sub { color:#667085; margin-top:6px; }
    .wrap { padding:28px 36px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
    .card { background:#fff; border:1px solid #d9e4f2; border-radius:18px; padding:20px; box-shadow:0 8px 24px rgba(10,37,64,.06); }
    .label { font-size:12px; letter-spacing:.14em; color:#667085; text-transform:uppercase; }
    .value { font-size:28px; font-weight:800; margin-top:12px; }
    .ok { color:#16803a; }
    .bad { color:#c62828; }
    table { width:100%; border-collapse:collapse; margin-top:14px; }
    th,td { padding:12px; border-bottom:1px solid #e5edf7; text-align:left; font-size:14px; }
    th { color:#667085; text-transform:uppercase; font-size:11px; letter-spacing:.12em; }
    code { font-size:12px; word-break:break-all; }
    button { background:#0A2540; color:white; border:0; border-radius:12px; padding:12px 18px; font-weight:700; cursor:pointer; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  </style>
</head>
<body>
<header>
  <h1>EXECUTIA Dashboard</h1>
  <div class="sub">Execution visibility — decision, ledger, proof.</div>
</header>

<div class="wrap">
  <div class="top">
    <strong>System overview</strong>
    <button onclick="loadDashboard()">Refresh</button>
  </div>

  <div class="grid">
    <div class="card"><div class="label">System</div><div id="status" class="value">—</div></div>
    <div class="card"><div class="label">Total executions</div><div id="total" class="value">—</div></div>
    <div class="card"><div class="label">Approved</div><div id="approved" class="value">—</div></div>
    <div class="card"><div class="label">Blocked / Escalated</div><div id="blocked" class="value">—</div></div>
  </div>

  <div class="card">
    <div class="label">Latest execution</div>
    <table>
      <thead>
        <tr>
          <th>When</th>
          <th>Decision</th>
          <th>Status</th>
          <th>Event</th>
          <th>Hash</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API_BASE = "/api/v1";

async function safeJson(url) {
  const r = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!r.ok) throw new Error(url + " failed: " + r.status);
  return r.json();
}

function decisionOf(x) {
  return x.ledger_decision || x.decision || x.payload?.decision || "—";
}

function statusOf(x) {
  return x.authoritative_status || x.execution_status || x.status || "—";
}

function hashOf(x) {
  return x.truth_hash || x.payload?.truth_hash || "—";
}

function eventOf(x) {
  return x.event_type || x.payload?.ledger?.event_type || "—";
}

async function loadDashboard() {
  const statusEl = document.getElementById("status");
  const rowsEl = document.getElementById("rows");

  try {
    const health = await safeJson(API_BASE + "/health");
    statusEl.textContent = health.status || "healthy";
    statusEl.className = "value ok";
  } catch (e) {
    statusEl.textContent = "offline";
    statusEl.className = "value bad";
  }

  try {
    const data = await safeJson(API_BASE + "/executions");
    const executions = Array.isArray(data) ? data : (data.executions || data.data || []);

    document.getElementById("total").textContent = executions.length;

    const approved = executions.filter(x => decisionOf(x) === "APPROVE").length;
    const blocked = executions.filter(x => ["BLOCK","ESCALATE"].includes(decisionOf(x))).length;

    document.getElementById("approved").textContent = approved;
    document.getElementById("blocked").textContent = blocked;

    rowsEl.innerHTML = executions.slice(0, 20).map(x => `
      <tr>
        <td>${x.created_at ? new Date(x.created_at).toLocaleString() : "—"}</td>
        <td><strong>${decisionOf(x)}</strong></td>
        <td>${statusOf(x)}</td>
        <td>${eventOf(x)}</td>
        <td><code>${hashOf(x)}</code></td>
      </tr>
    `).join("") || `<tr><td colspan="5">No executions yet.</td></tr>`;
  } catch (e) {
    rowsEl.innerHTML = `<tr><td colspan="5">Executions unavailable: ${e.message}</td></tr>`;
  }
}

loadDashboard();
</script>
</body>
</html>
