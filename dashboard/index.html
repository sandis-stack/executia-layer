<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EXECUTIA Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f9fc;
  margin: 0;
  padding: 40px;
  color: #0A2540;
}

h1 { margin-bottom: 5px; }
.sub { color: #666; margin-bottom: 30px; }

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #e0e6ed;
}

.label {
  font-size: 12px;
  color: #888;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

.online { color: green; }
.offline { color: #c62828; }
.review { color: #b45309; }

button {
  background: #0A2540;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #f0f3f8;
}

strong.approved { color: green; }
strong.blocked { color: #c62828; }
strong.review { color: #b45309; }

code {
  font-size: 12px;
}
</style>
</head>

<body>

<h1>EXECUTIA Dashboard</h1>
<div class="sub">Execution visibility — decision, ledger, proof.</div>

<div class="cards">
  <div class="card">
    <div class="label">SYSTEM</div>
    <div id="systemStatus" class="value offline">checking</div>
  </div>

  <div class="card">
    <div class="label">TOTAL EXECUTIONS</div>
    <div id="total" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">APPROVED</div>
    <div id="approved" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">BLOCKED / ESCALATED</div>
    <div id="blocked" class="value">—</div>
  </div>
</div>

<button onclick="loadData()">Refresh</button>
<button id="runBtn" onclick="runTestExecution()">Run test execution</button>

<table>
  <thead>
    <tr>
      <th>WHEN</th>
      <th>DECISION</th>
      <th>STATUS</th>
      <th>EVENT</th>
      <th>HASH</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const API_BASE = "https://execution.executia.io";
let loading = false;

function getDecision(e) {
  return e.decision || e.ledger_decision || e.result_status || e.status || "-";
}

function getStatus(e) {
  return e.status || e.authoritative_status || e.ticket_status_cache || e.result_status || "-";
}

function getEvent(e) {
  return e.event_type || e.payment_type || e.source || e.payload?.event_type || e.payload?.context?.source || "execution";
}

function getHash(e) {
  return e.truth_hash || e.payload?.truth_hash || e.execution_id || e.request_id || e.ticket_id || "";
}

function decisionClass(decision) {
  if (decision === "APPROVED" || decision === "APPROVE") return "approved";
  if (decision === "BLOCKED" || decision === "BLOCK") return "blocked";
  return "review";
}

async function loadData() {
  if (loading) return;
  loading = true;

  try {
    const healthRes = await fetch(`${API_BASE}/api/v1/health`);
    const health = await healthRes.json();

    const system = document.getElementById("systemStatus");
    if (health.ok && health.status === "healthy") {
      system.innerText = "online";
      system.className = "value online";
    } else {
      system.innerText = health.status || "degraded";
      system.className = "value review";
    }

    const res = await fetch(`${API_BASE}/api/v1/executions`);
    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "API error");
    }

    const executions = data.executions || [];

    document.getElementById("total").innerText = executions.length;

    let approved = 0;
    let blocked = 0;

    executions.forEach(e => {
      const d = getDecision(e);
      if (d === "APPROVED" || d === "APPROVE") approved++;
      else blocked++;
    });

    document.getElementById("approved").innerText = approved;
    document.getElementById("blocked").innerText = blocked;

    const table = document.getElementById("table");
    table.innerHTML = "";

    if (!executions.length) {
      table.innerHTML = `<tr><td colspan="5">No executions yet.</td></tr>`;
      return;
    }

    executions.slice(0, 50).forEach(e => {
      const d = getDecision(e);
      const h = getHash(e);

      table.innerHTML += `
        <tr>
          <td>${e.created_at || "-"}</td>
          <td><strong class="${decisionClass(d)}">${d}</strong></td>
          <td>${getStatus(e)}</td>
          <td>${getEvent(e)}</td>
          <td><code>${h ? h.substring(0, 12) : "-"}</code></td>
        </tr>
      `;
    });

  } catch (err) {
    document.getElementById("systemStatus").innerText = "offline";
    document.getElementById("systemStatus").className = "value offline";
    document.getElementById("table").innerHTML =
      `<tr><td colspan="5">Error: ${err.message}</td></tr>`;
  } finally {
    loading = false;
  }
}

async function runTestExecution() {
  const btn = document.getElementById("runBtn");

  try {
    btn.disabled = true;
    btn.innerText = "Running...";

    const scenarios = [
      { amount: 100, legalBlock: false },
      { amount: 15000, legalBlock: false },
      { amount: 0, legalBlock: false },
      { amount: 500, legalBlock: true }
    ];

    const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];

    const res = await fetch(`${API_BASE}/api/v1/execute`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        organization_id: "org_norsteel",
        session_id: "dashboard_session_" + Date.now(),
        project_id: "dashboard_test",
        event_type: "payment",
        amount: scenario.amount,
        currency: "EUR",
        context: {
          source: "dashboard",
          legalBlock: scenario.legalBlock
        }
      })
    });

    const data = await res.json();

    if (!res.ok || data.ok === false) {
      alert(data.error || "Execution failed");
      return;
    }

    await loadData();

  } catch (err) {
    alert(err.message || "Execution failed");
  } finally {
    btn.disabled = false;
    btn.innerText = "Run test execution";
  }
}

loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
