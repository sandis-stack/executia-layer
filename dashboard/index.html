<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EXECUTIA Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 40px;
      color: #0A2540;
    }

    h1 {
      margin-bottom: 5px;
    }

    .sub {
      color: #666;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #e0e6ed;
    }

    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .value {
      font-size: 22px;
      font-weight: bold;
    }

    .offline {
      color: red;
    }

    .online {
      color: green;
    }

    button {
      background: #0A2540;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #f0f3f8;
    }
  </style>
</head>
<body>

<h1>EXECUTIA Dashboard</h1>
<div class="sub">Execution visibility — decision, ledger, proof.</div>

<div class="cards">
  <div class="card">
    <div class="label">SYSTEM</div>
    <div id="systemStatus" class="value offline">offline</div>
  </div>

  <div class="card">
    <div class="label">TOTAL EXECUTIONS</div>
    <div id="total" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">APPROVED</div>
    <div id="approved" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">BLOCKED / ESCALATED</div>
    <div id="blocked" class="value">—</div>
  </div>
</div>

<button onclick="load()">Refresh</button>
<button onclick="testExecution()">Run test execution</button>

<table>
  <thead>
    <tr>
      <th>WHEN</th>
      <th>DECISION</th>
      <th>STATUS</th>
      <th>EVENT</th>
      <th>HASH</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const API_BASE = "/api/v1";

async function load() {
  try {
    const healthRes = await fetch(API_BASE + "/health");
    const health = await healthRes.json();

    if (health.status === "healthy") {
      document.getElementById("systemStatus").innerText = "online";
      document.getElementById("systemStatus").className = "value online";
    } else {
      document.getElementById("systemStatus").innerText = "degraded";
    }

  } catch (err) {
    document.getElementById("systemStatus").innerText =
      err.message || JSON.stringify(err);
  }

  try {
    const res = await fetch(API_BASE + "/executions");
    const data = await res.json();

    if (!data.ok) {
      throw new Error(data.error || "API error");
    }

    const executions = data.executions || [];

    document.getElementById("total").innerText = executions.length;

    let approved = 0;
    let blocked = 0;

    executions.forEach(e => {
      if (e.ledger_decision === "APPROVE") approved++;
      else blocked++;
    });

    document.getElementById("approved").innerText = approved;
    document.getElementById("blocked").innerText = blocked;

    const table = document.getElementById("table");
    table.innerHTML = "";

    executions.forEach(e => {
      const row = `
        <tr>
          <td>${e.created_at || "-"}</td>
          <td>${e.ledger_decision || "-"}</td>
          <td>${e.authoritative_status || "-"}</td>
          <td>${e.event_type || "-"}</td>
          <td>${(e.truth_hash || "").substring(0, 10)}</td>
        </tr>
      `;
      table.innerHTML += row;
    });

  } catch (err) {
    document.getElementById("table").innerHTML =
      `<tr><td colspan="5">Error: ${err.message || JSON.stringify(err)}</td></tr>`;
  }
}

async function testExecution() {
  try {
    await fetch(API_BASE + "/execute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount: 100,
        currency: "EUR"
      })
    });

    load();

  } catch (err) {
    alert(err.message || JSON.stringify(err));
  }
}

load();
</script>

</body>
</html>
