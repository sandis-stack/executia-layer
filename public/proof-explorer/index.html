<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EXECUTIA Proof Explorer</title>
<style>
body{margin:0;background:#f3f6fa;color:#0f2d4a;font-family:Arial,Helvetica,sans-serif}
main{max-width:1040px;margin:0 auto;padding:48px 22px}
.card{
background:#fff;
border:1px solid #d9e1ea;
border-radius:28px;
padding:36px;
margin-bottom:22px;
box-shadow:0 18px 46px rgba(16,32,51,.055);
}
.kicker{font-size:12px;letter-spacing:2px;font-weight:700;color:#60758b;margin-bottom:18px}
h1{font-size:48px;line-height:1.05;margin:0 0 18px}
p{font-size:16px;line-height:1.7;color:#42556d}
input{
width:100%;
box-sizing:border-box;
border:1px solid #cbd6e2;
border-radius:18px;
padding:14px 16px;
font-size:15px;
background:#fff;
}
button{
margin-top:16px;
background:#0f2d4a;
color:#fff;
border:0;
border-radius:18px;
padding:14px 20px;
font-size:12px;
letter-spacing:1.4px;
font-weight:700;
cursor:pointer;
}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
.metric{
border:1px solid #d9e1ea;
background:#f7f9fb;
border-radius:28px;
padding:18px;
box-shadow:0 18px 46px rgba(16,32,51,.055);
}
.metric span{display:block;font-size:11px;letter-spacing:1.4px;color:#60758b;font-weight:700}
.metric strong{display:block;margin-top:8px;font-size:18px;word-break:break-all}
.event{border-left:3px solid #0f2d4a;background:#f7f9fb;padding:16px;margin-top:12px}
.event-title{font-size:13px;letter-spacing:1.6px;font-weight:700}
.event-time{font-size:12px;color:#60758b;margin-top:6px}
.hash{font-size:12px;color:#42556d;word-break:break-all;margin-top:8px}
@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:32px}}

.reg-shell{
  max-width:1180px;
  margin:0 auto;
  padding:28px 22px 60px;
}

.reg-header{
  height:86px;
  display:grid;
  grid-template-columns:300px 1fr auto;
  align-items:center;
  gap:18px;
  border-bottom:1px solid #D6DFEA;
  margin-bottom:34px;
}

.reg-brand{
  display:flex;
  flex-direction:column;
  gap:4px;
  text-decoration:none;
}

.reg-brand strong{
  font-size:22px;
  letter-spacing:.08em;
  color:#1E3A5F;
}

.reg-brand span{
  font-size:11px;
  letter-spacing:.18em;
  color:#607080;
  text-transform:uppercase;
}

.system-layer{
  justify-self:center;
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px;
  border:1px solid #D6DFEA;
  border-radius:999px;
  background:rgba(255,255,255,.72);
}

.system-layer a{
  text-decoration:none;
  font-size:11px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#607080;
  padding:9px 12px;
  border-radius:999px;
}

.system-layer a.active{
  background:#1E3A5F;
  color:#ffffff;
}

.reg-nav{
  justify-self:end;
  display:flex;
  gap:10px;
  align-items:center;
}

.reg-nav a{
  text-decoration:none;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#607080;
  padding:9px 12px;
  border-radius:999px;
}

.reg-nav a.active{
  color:#1E3A5F;
}

.reg-nav a.primary{
  color:#fff;
  background:#1E3A5F;
}

@media(max-width:860px){
  .reg-header{
    height:auto;
    grid-template-columns:1fr;
    padding:18px 0;
  }

  .system-layer,
  .reg-nav{
    justify-self:start;
    width:100%;
    overflow:auto;
  }
}

</style>
</head>
<body>
  <div class="reg-shell">
    <header class="reg-header">
      <a class="reg-brand" href="https://executia.io">
        <strong>EXECUTIA™</strong>
        <span>Execution Control Standard</span>
      </a>

      <nav class="system-layer" aria-label="System layers">
        <a href="https://executia.io">Entry</a>
        <a href="/execution-test/">Execution Test</a>
        <a href="/dashboard">Engine</a>
      </nav>

      <nav class="reg-nav" aria-label="Proof actions">
        <a class="active" href="/proof-explorer/">Proof</a>
        <a href="/regulator/">Regulator</a>
        <a class="primary" href="/request-pilot/">Request Pilot</a>
      </nav>
    </header>

<main>
  <section class="card">
    <div class="kicker">EXECUTIA · PUBLIC PROOF EXPLORER</div>
    <h1>Verify execution proof integrity.</h1>
    <p>Enter a governance review ID to verify immutable chain continuity, head hash, and event sequence.</p>

    <input id="reviewId" placeholder="Review ID" />
    <button onclick="verifyProof()">VERIFY PROOF</button>

<script>
const params = new URLSearchParams(window.location.search);
const reviewIdParam = params.get("review_id");

if(reviewIdParam){
  window.addEventListener("load", ()=>{
    document.getElementById("reviewId").value = reviewIdParam;
    verifyProof();
  });
}
</script>
  </section>

  <section class="card" id="result" style="display:none;"></section>
</main>

<script>
async function verifyProof(){
  const reviewId = document.getElementById("reviewId").value.trim();
  const result = document.getElementById("result");

  if(!reviewId){
    alert("Review ID required");
    return;
  }

  result.style.display = "block";
  result.innerHTML = "Verifying proof chain...";

  const res = await fetch(`/api/v1/proof/verify?review_id=${encodeURIComponent(reviewId)}`);
  const data = await res.json();

  if(!data.ok){
    result.innerHTML = `<div class="event-title">Verification failed</div><p>${data.error || "Unknown error"}</p>`;
    return;
  }

  result.innerHTML = `
    <div class="event-title" style="margin-bottom:18px;">Verification result</div>

    <div class="grid">
      <div class="metric"><span>CHAIN</span><strong>${data.immutable_chain_verified ? "VERIFIED" : "FAILED"}</strong></div>
      <div class="metric"><span>EVENTS</span><strong>${data.events_checked}</strong></div>
      <div class="metric"><span>HASHED</span><strong>${data.hashed_events_checked}</strong></div>
      <div class="metric"><span>BROKEN AT</span><strong>${data.broken_at || "NONE"}</strong></div>
    </div>

    <div class="hash" style="margin-top:24px;"><strong>HEAD HASH</strong><br>${data.head_hash || "-"}</div>

    <div style="margin-top:28px;">
      ${(data.event_types || []).map((t,i)=>`
        <div class="event">
          <div class="event-title">${i+1}. ${t}</div>
        </div>
      `).join("")}
    </div>
  `;
}
</script>
  </div>
</body>
</html>
