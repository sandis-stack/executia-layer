    *{box-sizing:border-box}

    header{
      height:68px;

      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 28px;
    .brand{
      font-weight:900;
      letter-spacing:.1em;
      color:var(--blue);
      font-size:18px;
    .sub{
      font-size:11px;

      letter-spacing:.12em;

      margin-top:4px;

      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;

      border-radius:999px;
      font-size:10px;

      grid-template-columns:300px 1fr 420px;
      gap:16px;
      padding:16px;

      const constitution = (events || []).find((event) =>
        String(event.type || "").includes("CONSTITUTION_BLOCK")
      );

        String(event.type || "").includes("GOVERNANCE_FREEZE_CREATED")
      const blocked = (events || []).find((event) =>
        String(event.type || "").includes("GOVERNANCE_EXECUTION_BLOCKED_BY_FREEZE")
      const released = (events || []).find((event) =>
        String(event.type || "").includes("GOVERNANCE_FREEZE_RELEASED")
      const steps = [
        constitution ? ["CONSTITUTION", constitution.type, constitution.meta || "Rule triggered"] : null,
        freeze ? ["AUTO FREEZE", freeze.type, freeze.meta || "Freeze materialized"] : null,
        blocked ? ["STOP", blocked.type, blocked.meta || "Execution blocked"] : null,
        released ? ["RECOVERY", released.type, released.meta || "Freeze released"] : null
      ].filter(Boolean);
      if(!steps.length) return "";
      return `

          <div class="small">Deterministic reconstruction of governance cause → containment → recovery.</div>

            <div class="replay-event ${window.__replayClass(event)}">
              <div class="replay-stage">${escapeHtml(event.stage || event.source || "EVENT")}</div>
              <div>
                <div class="replay-title">${escapeHtml(event.type || "UNKNOWN")}</div>

              <div class="replay-time">${escapeHtml(event.created_at || "—")}</div>

          payload.operator_email ||
          event?.actor_email ||

          payload.operator_role ||
          event?.actor_role ||
          (String(event?.actor || "").includes("supervisor") ? "SUPERVISOR" : "OPERATOR"),

      if(v.includes("BROKEN") || v.includes("FAILED")) return "bad";
      if(v.includes("FREEZE") || v.includes("LOCK")) return "lock";
      if(v.includes("PENDING") || v.includes("OPEN") || v.includes("REVIEW")) return "warn";
      if(v.includes("COMMITTED") || v.includes("VERIFIED") || v.includes("CLEAR") || v.includes("OPERATIONAL")) return "ok";

    function renderIncidentMode(){
      const banner = $("incidentBanner");
      if(!banner) return;
      const ops = window.__OPS__ || {};
      const chainBroken = ops?.chain && ops.chain.verified === false;
      const freezeActive = Number(ops?.emergency?.active_freeze_count || 0) > 0;
      const forensicActive = ops?.operations_flags?.forensic_mode === true;
      const quorumStalled = Number(ops?.governance?.quorum_pending || 0) > 0;
      const highRiskOverload = Number(ops?.governance?.high_risk || 0) >= 10;
      const incidents = [];
      if(chainBroken) incidents.push("CHAIN_BROKEN");
      if(freezeActive) incidents.push("FREEZE_ACTIVE");
      if(forensicActive) incidents.push("FORENSIC_ACTIVE");
      if(quorumStalled) incidents.push("QUORUM_PENDING");
      if(highRiskOverload) incidents.push("HIGH_RISK_OVERLOAD");
      const active = incidents.length > 0;
      banner.classList.toggle("active", active);
      if($("incidentState")){
        $("incidentState").textContent = active
          ? "INCIDENT MODE ACTIVE"
          : "GOVERNANCE CLEAR";
