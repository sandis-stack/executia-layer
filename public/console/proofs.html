<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Public Verify — EXECUTIA™</title>
  <link rel="stylesheet" href="/components/engine-shell.css" />
  <link rel="stylesheet" href="/components/executia-governed-presentation.css" />
  <script src="/components/executia-governance-core.js"></script>
</head>
<body class="ex-engine-shell ex-ds-governance-shell ex-op-shell ex-gov-core-enabled ex-operational-surface ex-ds-surface" data-op-page="proofs">
  <main class="ex-op-main proofs-wrap">
    <section class="ex-op-surface ex-op-surface--public-verify ex-ds-pad-block">
      <h1 class="ex-ds-executive ex-ex-id-tier-primary">Execution verified</h1>
      <p class="ex-ds-diagnostics ex-ex-id-tier-tertiary">Public verify surface · governed execution proof · read only.</p>
    </section>
  </main>

  <script src="/components/engine-shell.js"></script>
  <script src="/components/executia-operational-shell.js"></script>
  <script>
    (function () {
      const T = window.EXECUTIA_GOVERNANCE_LANGUAGE?.TERMS || {};
      const bundle = {
        intel: {},
        ag: { canonical_authority: [1] },
        data: { engineering_console_authority: { GOVERNED: true, ACTIVE: true } }
      };
      if (window.EXECUTIA_GOVERNANCE_CORE?.applyPresentation) {
        window.EXECUTIA_GOVERNANCE_CORE.applyPresentation(bundle);
      } else if (window.EXECUTIA_OPERATIONAL_SHELL?.setAuthorityState) {
        window.EXECUTIA_OPERATIONAL_SHELL.setAuthorityState(
          `${T.GOVERNED || "Governed"} · ${T.READ_ONLY || "Read only"}`,
          `${T.VERIFIED || "Verified"} execution proof`
        );
      }
    })();
  </script>
</body>
</html>
