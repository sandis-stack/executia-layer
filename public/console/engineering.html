<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Execution Authority — EXECUTIA™</title>
  <meta name="description" content="EXECUTIA execution authority — canonical truth, governed consequence, deterministic integrity." />
  <link rel="stylesheet" href="/enterprise.css" />
  <link rel="stylesheet" href="/components/engine-shell.css" />
  <link rel="stylesheet" href="/components/executia-governed-presentation.css" />
  <script src="/components/executia-governance-core.js"></script>
  <script src="/components/executia-execution-rhythm.js"></script>
  <script src="/components/executia-execution-consequence.js"></script>
  <script src="/components/executia-execution-memory.js"></script>
  <script src="/components/executia-execution-intent.js"></script>
  <script src="/components/executia-execution-trust.js"></script>
  <script src="/components/executia-execution-sovereignty.js"></script>
  <script src="/components/executia-canonical-compression.js"></script>
</head>
<body class="ex-engine-shell ex-ds-governance-shell ex-op-shell ex-operational-surface ex-ds-surface ex-gov-core-enabled ex-rhythm-enabled ex-consequence-enabled ex-memory-enabled ex-intent-enabled ex-trust-enabled ex-sovereignty-enabled ex-compression-enabled ex-gov-modes-enabled" data-op-page="engineering">
  <main class="ex-op-main ex-ds-atmosphere">
    <div class="ex-gov-surface-root" id="govSurfaceRoot">
      <article class="ex-gov-mode-panel" data-mode-panel="executive" hidden></article>
      <article class="ex-gov-mode-panel" data-mode-panel="operational" hidden></article>
      <article class="ex-gov-mode-panel" data-mode-panel="engineering" hidden></article>
      <article class="ex-gov-mode-panel" data-mode-panel="audit" hidden></article>
      <article class="ex-gov-mode-panel" data-mode-panel="public-verify" hidden></article>
    </div>
  </main>

  <script src="/components/engine-shell.js"></script>
  <script src="/components/executia-operational-shell.js"></script>
  <script src="/components/executia-governance-modes.js"></script>
  <script src="/components/engineering-governance-surfaces.js"></script>
  <script>
    const API = "/api/v1/engineering/intelligence";
    const LANG = window.EXECUTIA_GOVERNANCE_CORE?.LANGUAGE || window.EXECUTIA_GOVERNANCE_LANGUAGE || {};
    const T = LANG.TERMS || {};
    const P = LANG.PHRASES || {};
    const CORE = () => window.EXECUTIA_GOVERNANCE_CORE;
    const RHYTHM = () => window.EXECUTIA_EXECUTION_RHYTHM;
    const CONSEQUENCE = () => window.EXECUTIA_EXECUTION_CONSEQUENCE;
    const MEMORY = () => window.EXECUTIA_EXECUTION_MEMORY;
    const INTENT = () => window.EXECUTIA_EXECUTION_INTENT;
    const TRUST = () => window.EXECUTIA_EXECUTION_TRUST;
    const SOVEREIGNTY = () => window.EXECUTIA_EXECUTION_SOVEREIGNTY;
    const COMPRESSION = () => window.EXECUTIA_CANONICAL_COMPRESSION;
    const GM = () => window.EXECUTIA_GOVERNANCE_MODES;
    const GS = () => window.EXECUTIA_GOVERNANCE_SURFACES;
    let rhythmController = null;
    let lastPayload = null;

    function formatTs(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString(undefined, {
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch {
        return String(iso ?? "—");
      }
    }

    function buildContext(data) {
      return {
        data,
        ag: data.architecture_graph,
        intel: data.execution_intelligence,
        ledger: data.engineering_ledger || [],
        T,
        P,
        formatTs
      };
    }

    function rhythmContext() {
      return lastPayload ? buildContext(lastPayload) : { data: {}, ag: {}, intel: {}, T, P, formatTs };
    }

    function applyGovernedPresentation(ctx) {
      if (COMPRESSION()?.applyCompression) {
        COMPRESSION().applyCompression(ctx);
        return;
      }
      if (CORE()?.applyPresentation) CORE().applyPresentation(ctx);
      if (RHYTHM()?.applyRhythm) RHYTHM().applyRhythm(ctx, { syncing: false });
      if (CONSEQUENCE()?.applyConsequence) CONSEQUENCE().applyConsequence(ctx);
      if (MEMORY()?.applyMemory) MEMORY().applyMemory(ctx);
      if (INTENT()?.applyIntent) INTENT().applyIntent(ctx);
      if (TRUST()?.applyTrust) TRUST().applyTrust(ctx);
      if (SOVEREIGNTY()?.applySovereignty) SOVEREIGNTY().applySovereignty(ctx);
    }

    function renderCurrentMode() {
      if (!lastPayload || !GS()) return;
      const mode = GM()?.readStoredMode?.() || document.body.dataset.governanceMode || "engineering";
      const ctx = buildContext(lastPayload);
      applyGovernedPresentation(ctx);
      GS().renderActiveMode(mode, ctx);
    }

    async function synchronizeGovernance() {
      const res = await fetch(API, { cache: "no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error?.message || P.OPERATIONAL_UNAVAILABLE);
      lastPayload = data;
      renderCurrentMode();
    }

    document.addEventListener("executia:governance-mode-change", () => {
      if (lastPayload) renderCurrentMode();
    });

    window.addEventListener("beforeunload", () => rhythmController?.stop?.());

    if (RHYTHM()?.runGovernedRefresh) {
      rhythmController = RHYTHM().runGovernedRefresh(synchronizeGovernance, {
        cadenceMs: RHYTHM().DEFAULT_CADENCE_MS,
        context: rhythmContext
      });
    } else {
      synchronizeGovernance().catch(() => {
        CORE()?.setAuthorityState?.(P.OPERATIONAL_UNAVAILABLE, "—");
      });
    }
  </script>
</body>
</html>
