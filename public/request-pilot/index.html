<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EXECUTIA — Request Pilot</title>
  <link rel="stylesheet" href="/components/executia-design-system.css" />
  <link rel="stylesheet" href="/components/executia-institutional-environment.css" />
  <script src="/components/executia-institutional-environment.js" defer></script>
  <script src="/components/executia-pilot-readiness.js" defer></script>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#dbe5ef;
      --text:#102033;
      --muted:#607080;
      --blue:#1E3A5F;
      --green:#166534;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,sans-serif;
    }

    .shell{
      width:min(1080px,calc(100% - 32px));
      margin:0 auto;
      padding:28px 0 80px;
    }

    header{
      height:86px;
      display:grid;
      grid-template-columns:300px 1fr auto;
      align-items:center;
      gap:18px;
      border-bottom:1px solid var(--line);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand strong{
      font-size:22px;
      letter-spacing:.08em;
      color:var(--blue);
    }

    .brand span{
      font-size:11px;
      letter-spacing:.18em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .system-layer{
      justify-self:center;
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.72);
    }

    .system-layer a{
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      padding:9px 12px;
      border-radius:999px;
    }

    .system-layer a.active{
      background:var(--blue);
      color:#ffffff;
    }

    .nav{
      justify-self:end;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .nav a{
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      padding:9px 12px;
      border-radius:999px;
    }

    .nav a.primary{
      color:#fff;
      background:var(--blue);
    }

    .hero{
      padding:40px 0 28px;
    }

    .eyebrow{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:#e9f0f8;
      color:var(--blue);
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    h1{
      margin:18px 0 0;
      font-size:64px;
      line-height:.95;
      letter-spacing:-.06em;
    }

    .lead{
      margin:22px 0 0;
      max-width:820px;
      color:var(--muted);
      font-size:20px;
      line-height:1.8;
    }

    .panel{
      margin-top:28px;
      border-radius:30px;
      background:var(--card);
      border:1px solid var(--line);
      padding:32px;
      box-shadow:0 18px 46px rgba(16,32,51,.05);
    }

    .panel h2{
      margin:0;
      font-size:32px;
      line-height:1;
      letter-spacing:-.05em;
    }

    .panel p{
      margin:16px 0 0;
      color:var(--muted);
      line-height:1.8;
    }

    .grid{
      margin-top:28px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
    }

    .field{
      display:grid;
      gap:10px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#607080;
    }

    input,
    textarea,
    select{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:18px;
      padding:16px 18px;
      font:inherit;
      color:var(--text);
      outline:none;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .submit{
      margin-top:26px;
      border:0;
      border-radius:999px;
      background:var(--blue);
      color:#fff;
      padding:18px 24px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .result{
      display:none;
      margin-top:24px;
      border-radius:24px;
      padding:26px;
      background:linear-gradient(135deg,#1E3A5F,#294c78);
      color:#fff;
    }

    .result.visible{
      display:block;
    }

    .result h3{
      margin:0;
      font-size:34px;
      line-height:1;
      letter-spacing:-.04em;
    }

    .result p{
      margin:16px 0 0;
      color:rgba(255,255,255,.84);
      line-height:1.8;
    }

    .result-grid{
      margin-top:24px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }

    .result-box{
      border-radius:18px;
      padding:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .result-box span{
      display:block;
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.7);
      margin-bottom:10px;
    }

    .result-box strong{
      display:block;
      line-height:1.6;
    }

    @media(max-width:860px){
      .grid,
      .result-grid{
        grid-template-columns:1fr;
      }

      header{
        height:auto;
        grid-template-columns:1fr;
        padding:18px 0;
      }

      .system-layer,
      .nav{
        justify-self:start;
        width:100%;
        overflow:auto;
      }

      h1{
        font-size:48px;
      }

      .lead{
        font-size:18px;
      }

      .panel{
        padding:24px;
      }
    }
  </style>
</head>

<body class="ex-institutional-env" data-ex-env-page="request">

  <div class="shell">

    <header data-ex-env-header></header>

    <section class="hero">

      <div class="eyebrow">Request pilot</div>

      <h1>Institutional onboarding.</h1>

      <p class="lead">Pilot intake — not a contact form. Review state issued under execution authority.</p>
      <div data-ex-env-onboarding-steps></div>
      <div data-ex-env-consequence></div>

    </section>

    <section class="panel">

      <h2>Pilot record</h2>
      <div data-ex-env-pilot-examples></div>

      <div class="grid">

        <div class="field full">
          <label>Organization</label>
          <input id="organization" placeholder="Institution or operator name">
        </div>

        <div class="field full">
          <label>Execution-critical process</label>
          <textarea id="execution_critical_process" placeholder="Process where execution failure is material."></textarea>
        </div>

        <div class="field full">
          <label>Governance risk</label>
          <textarea id="governance_risk" placeholder="Material risk if execution proceeds without governance."></textarea>
        </div>

        <div class="field full">
          <label>Deterministic execution objective</label>
          <textarea id="deterministic_execution_objective" placeholder="What Deterministic Execution must guarantee."></textarea>
        </div>

        <div class="field full">
          <label>Replay requirement</label>
          <input id="replay_requirement" placeholder="Replay-Safe Verification before commit">
        </div>

        <div class="field full">
          <label>Proof requirement</label>
          <input id="proof_requirement" placeholder="Execution-Time Truth and canonical receipt">
        </div>

        <div class="field">
          <label>Contact</label>
          <input id="contact" placeholder="Name">
        </div>

        <div class="field">
          <label>Email</label>
          <input id="email" placeholder="contact@organization.com">
        </div>

      </div>

      <button class="submit" onclick="submitPilotRequest()">
        Request Pilot
      </button>

      <div class="result" id="result">

        <h3>Pilot review state issued</h3>

        <p>Onboarding record received under execution authority.</p>

        <div class="result-grid">

          <div class="result-box">
            <span>Pilot Review ID</span>
            <strong id="pilotReviewId">—</strong>
          </div>

          <div class="result-box">
            <span>Governance State</span>
            <strong id="pilotState">—</strong>
          </div>

          <div class="result-box">
            <span>Replay</span>
            <strong id="pilotReplay">RECORDED</strong>
          </div>

        </div>

      </div>

    </section>

    <footer data-ex-env-footer></footer>
  </div>

  <script>
    async function submitPilotRequest(){
      const process = document.getElementById("execution_critical_process").value;
      const governance_risk = document.getElementById("governance_risk").value;
      const objective = document.getElementById("deterministic_execution_objective").value;
      const payload = {
        organization: document.getElementById("organization").value,
        execution_critical_process: process,
        governance_risk,
        deterministic_execution_objective: objective,
        replay_requirement: document.getElementById("replay_requirement").value,
        proof_requirement: document.getElementById("proof_requirement").value,
        problem: [process, governance_risk, objective].filter(Boolean).join("\n\n"),
        contact: document.getElementById("contact").value,
        email: document.getElementById("email").value
      };

      const response = await fetch("/api/v1/pilot/request",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify(payload)
      });

      const data = await response.json();

      if(!response.ok || !data.ok){
        alert(data?.error?.message || "Pilot request failed.");
        return;
      }

      document.getElementById("result").classList.add("visible");

      document.getElementById("pilotReviewId").textContent =
        data.review_id || "—";

      document.getElementById("pilotState").textContent =
        data.state || "RECEIVED";

      document.getElementById("pilotReplay").textContent =
        document.getElementById("replay_requirement").value ? "REQUIRED" : "—";
    }
  </script>

</body>
</html>
