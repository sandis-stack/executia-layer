<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EXECUTIA — Public Proof Receipt</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --panel:#ffffff;
      --text:#102033;
      --muted:#5f6f82;
      --line:#dce5ef;
      --blue:#1E3A5F;
      --soft:#eef4fb;
      --green:#157347;
      --shadow:0 18px 50px rgba(16,32,51,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
      background:linear-gradient(180deg,#f9fbfe 0%,#f3f6fa 100%);
      color:var(--text);
    }
    .shell{max-width:1120px;margin:0 auto;padding:30px 22px 70px}
    header{
      height:86px;
      display:grid;
      grid-template-columns:300px 1fr auto;
      align-items:center;
      gap:18px;
      border-bottom:1px solid var(--line);
    }

    a{color:inherit;text-decoration:none}

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand strong{
      font-size:22px;
      letter-spacing:.08em;
      color:var(--blue);
    }

    .brand span{
      font-size:11px;
      letter-spacing:.18em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .system-layer{
      justify-self:center;
      display:flex;
      align-items:center;
      gap:10px;
      padding:6px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.72);
    }

    .system-layer a{
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      padding:9px 12px;
      border-radius:999px;
    }

    .system-layer a.active{
      background:var(--blue);
      color:#ffffff;
    }

    .nav{
      justify-self:end;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .nav a{
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      padding:9px 12px;
      border-radius:999px;
    }

    .nav a.primary{
      background:var(--blue);
      color:#fff;
    }
    .hero{
      padding:66px 0 30px;
      display:grid;
      grid-template-columns:.96fr .84fr;
      gap:28px;
      align-items:end;
    }
    .eyebrow{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:var(--soft);
      color:var(--blue);
      font-size:12px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:18px;
    }
    h1{
      margin:0;
      font-size:54px;
      line-height:1.02;
      letter-spacing:-.045em;
      color:#0f2338;
    }
    .lead{
      margin:20px 0 0;
      font-size:19px;
      line-height:1.55;
      color:var(--muted);
      max-width:720px;
    }
    .status{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }
    .status h2{margin:0 0 12px;font-size:18px;color:var(--blue)}
    .big{
      font-size:34px;
      line-height:1;
      font-weight:900;
      color:var(--green);
      letter-spacing:-.03em;
    }

    .big.blocked{
      color:#b42318;
    }

    .blocked-proof-banner{
      margin-top:26px;
      border-radius:28px;
      padding:32px;
      background:linear-gradient(135deg,#7f1d1d,#b42318);
      color:#ffffff;
    }

    .blocked-proof-kicker{
      font-size:11px;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
      margin-bottom:14px;
    }

    .blocked-proof-banner h2{
      margin:0;
      font-size:46px;
      line-height:1;
      letter-spacing:-.05em;
      color:#ffffff;
    }

    .blocked-proof-banner p{
      margin:18px 0 0;
      max-width:820px;
      color:rgba(255,255,255,.88);
      line-height:1.8;
      font-size:17px;
    }

    .blocked-proof-grid{
      margin-top:26px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }

    .blocked-proof-box{
      border-radius:18px;
      padding:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .blocked-proof-box span{
      display:block;
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.68);
      margin-bottom:10px;
    }

    .blocked-proof-box strong{
      display:block;
      font-size:15px;
      line-height:1.5;
      color:#ffffff;
    }

    @media(max-width:900px){
      .blocked-proof-grid{
        grid-template-columns:1fr;
      }

      .blocked-proof-banner h2{
        font-size:36px;
      }
    }

    .small{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    main{
      margin-top:24px;
    }

    .proof-grid{
      display:grid;
      grid-template-columns:minmax(640px,760px) minmax(420px,1fr);
      gap:28px;
      align-items:start;
    }

    .proof-left{
      display:grid;
      grid-template-columns:repeat(2,minmax(300px,1fr));
      gap:18px;
      align-items:start;
    }

    .proof-right{
      min-width:0;
    }

    .event-chain-panel{
      margin-top:28px;
      max-width:720px;
    }
    .panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }
    .panel h2{
      margin:0 0 14px;
      color:var(--blue);
      font-size:20px;
    }
    .row{
      display:flex;
      justify-content:space-between;
      gap:14px;
      border-bottom:1px solid var(--line);
      padding:12px 0;
      margin-top:0;
      background:transparent;
      font-size:13px;
    }

    .row:last-child{
      border-bottom:0;
    }
    .row span:first-child{color:var(--muted)}
    .row span:last-child{
      color:var(--blue);
      font-weight:800;
      text-align:right;
      min-width:0;
      overflow-wrap:anywhere;
      word-break:break-word;
    }
    .event{
      position:relative;
      border-bottom:1px solid var(--line);
      padding:18px 0 18px 34px;
      background:transparent;
      margin-top:0;
    }

    .event:last-child{
      border-bottom:0;
    }

    .event::before{
      content:"";
      position:absolute;
      left:8px;
      top:24px;
      width:10px;
      height:10px;
      border-radius:999px;
      background:#163a63;
      box-shadow:0 0 0 6px #edf3fa;
    }

    .event::after{
      content:"";
      position:absolute;
      left:12px;
      top:40px;
      bottom:-18px;
      width:1px;
      background:#d9e3ef;
    }

    .event:last-child::after{
      display:none;
    }
    .event-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
    }
    .event strong{
      color:#132a44;
      font-size:13px;
      letter-spacing:.08em;
    }
    .event code{
      color:#60758b;
      font-size:11px;
      letter-spacing:.04em;
      font-family:monospace;
      word-break:break-word;
    }

    .explain-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:18px;
    }

    .explain-card{
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px;
      background:#fbfdff;
    }

    .explain-card h3{
      margin:0 0 14px;
      font-size:16px;
      color:var(--blue);
      letter-spacing:-.02em;
    }

    .explain-list{
      display:grid;
      gap:10px;
    }

    .explain-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:#ffffff;
      color:#294055;
      font-size:13px;
      line-height:1.55;
    }

    .explain-summary{
      margin-top:24px;
      border-radius:24px;
      padding:26px;
      background:linear-gradient(135deg,#1E3A5F,#294c78);
      color:#ffffff;
    }

    .explain-summary h2{
      margin:0;
      font-size:32px;
      line-height:1.04;
      letter-spacing:-.04em;
      color:#ffffff;
    }

    .explain-summary p{
      margin:14px 0 0;
      max-width:760px;
      color:rgba(255,255,255,.84);
      font-size:17px;
      line-height:1.7;
    }

    @media(max-width:860px){
      .explain-grid{
        grid-template-columns:1fr;
      }
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:22px;
    }
    .btn{
      display:inline-flex;
      justify-content:center;
      align-items:center;
      border-radius:999px;
      padding:14px 18px;
      font-weight:800;
      font-size:14px;
    }
    .btn.primary{background:var(--blue);color:#fff}
    .btn.soft{background:#fff;border:1px solid var(--line);color:var(--blue)}
    .missing{
      padding:30px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      box-shadow:var(--shadow);
      color:var(--muted);
      line-height:1.6;
      margin-top:30px;
    }
    footer{
      margin-top:44px;
      border-top:1px solid var(--line);
      padding-top:22px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      justify-content:space-between;
      gap:18px;
    }
    @media(max-width:860px){
      .hero,
      .proof-grid,
      .proof-left{
        grid-template-columns:1fr;
      }
      h1{font-size:40px}
      header{
        height:auto;
        grid-template-columns:1fr;
        padding:18px 0;
      }

      .system-layer,
      .nav{
        justify-self:start;
        width:100%;
        overflow:auto;
      }
      footer{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a class="brand" href="https://executia.io">
        <strong>EXECUTIA™</strong>
        <span>Execution Control Standard</span>
      </a>

      <nav class="system-layer" aria-label="System layers">
        <a href="https://executia.io">Entry</a>
        <a href="/execution-test/">Execution Test</a>
        <a href="/dashboard">Engine</a>
      </nav>

      <nav class="nav" aria-label="Proof actions">
        <a class="active" href="/public-proof/">Proof</a>
        <a href="/regulator/">Regulator</a>
        <a class="primary" href="/request-pilot/">Request Pilot</a>
      </nav>
    </header>

    <div id="app"></div>

    <footer>
      <div>EXECUTIA™ — Execution-time truth infrastructure.</div>
      <div>
        <a href="/execution-test/">Execution Test</a> ·
        <a href="/proof-explorer/">Proof Explorer</a> ·
        <a href="/regulator/">Regulator</a>
      </div>
    </footer>
  </div>

  <script>
    function esc(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function getReviewId(){
      const params = new URLSearchParams(window.location.search);
      return params.get("review_id") || "";
    }

    function shortHash(value){
      const text = String(value || "");
      return text ? text.slice(0, 28) + "..." : "—";
    }

    async function loadProof(){
      const reviewId = getReviewId();

      if(!reviewId){
        document.getElementById("app").innerHTML = `
          <div class="missing">
            <strong style="color:#1E3A5F">Review ID is missing.</strong><br>
            Add a review_id to the URL or generate a new execution proof from the Execution Test flow.
            <div class="actions">
              <a class="btn primary" href="/execution-test/">Run Execution Test</a>
            </div>
          </div>
        `;
        return;
      }

      document.getElementById("app").innerHTML = `
        <div class="missing">
          <strong style="color:#1E3A5F">Loading persistent proof receipt...</strong><br>
          EXECUTIA is reading the server-side execution registry.
        </div>
      `;

      let data = null;

      try {
        const response = await fetch(
          "/api/v1/execution/registry?review_id=" + encodeURIComponent(reviewId)
        );

        const registryData = await response.json();

        if (!response.ok || !registryData.ok) {
          throw new Error(registryData?.error?.message || "Registry proof receipt not found.");
        }

        data = registryData.receipt || registryData.record?.receipt || null;

        if (!data) {
          throw new Error("Registry record exists, but receipt payload is missing.");
        }
      } catch (error) {
        const key = "executia_proof_" + reviewId;
        const raw = localStorage.getItem(key);

        if(raw){
          data = JSON.parse(raw);
        } else {
          document.getElementById("app").innerHTML = `
            <div class="missing">
              <strong style="color:#1E3A5F">Proof receipt not found.</strong><br>
              ${esc(error.message || "No persistent registry record found for this review_id.")}
              <div class="actions">
                <a class="btn primary" href="/execution-test/">Run Execution Test</a>
                <a class="btn soft" href="/proof-explorer/">Open Proof Explorer</a>
              </div>
            </div>
          `;
          return;
        }
      }

      const submission = data.submission || {};
      const analysis = data.analysis || {};
      const proof = data.proof_preview || {};
      const chain = Array.isArray(data.proof_chain) ? data.proof_chain : [];

      const isBlocked =
        analysis.governance_decision === "BLOCKED_EXECUTION" ||
        analysis.risk_level === "BLOCKED_EXECUTION_RISK";

      const heroTitle = isBlocked
        ? "Execution was prevented before commitment."
        : "Execution became immutable proof.";

      const heroText = isBlocked
        ? "This receipt proves EXECUTIA prevented invalid execution materialization before commitment and recorded immutable governance evidence."
        : "This receipt shows the execution submission, governance decision, proof-chain head hash and materialized event sequence.";

      const statusLabel = isBlocked ? "BLOCKED" : "VERIFIED";

      document.getElementById("app").innerHTML = `
        <section class="hero">
          <div>
            <div class="eyebrow">Public Proof Receipt</div>
            <h1>${esc(heroTitle)}</h1>
            <p class="lead">
              ${esc(heroText)}
            </p>
          </div>

          <aside class="status">
            <h2>Proof Status</h2>
            <div class="big ${isBlocked ? 'blocked' : ''}">${esc(statusLabel)}</div>
            <div class="small">Persistent registry receipt prepared for regulator-readable proof inspection.</div>
          </aside>
        ${isBlocked ? `
        <section class="blocked-proof-banner">
          <div class="blocked-proof-kicker">
            EXECUTION FAILURE PREVENTED
          </div>

          <h2>
            EXECUTIA blocked invalid execution before reality changed.
          </h2>

          <p>
            Governance validation detected structural execution violations before commitment. Invalid execution was prevented before settlement, approval bypass or uncontrolled materialization became possible.
          </p>

          <div class="blocked-proof-grid">

            <div class="blocked-proof-box">
              <span>Governance Decision</span>
              <strong>BLOCKED_EXECUTION</strong>
            </div>

            <div class="blocked-proof-box">
              <span>Failure Prevention</span>
              <strong>Execution divergence prevented before commitment.</strong>
            </div>

            <div class="blocked-proof-box">
              <span>Immutable Evidence</span>
              <strong>Governance block recorded inside immutable proof chain.</strong>
            </div>

          </div>
        </section>
        ` : ``}

        <main>
          <section class="proof-grid">

            <div class="proof-left">

              <section class="panel">
                <h2>Execution Receipt</h2>
                <div class="row"><span>Review ID</span><span>${esc(submission.review_id)}</span></div>
                <div class="row"><span>Submission ID</span><span>${esc(submission.submission_id)}</span></div>
                <div class="row"><span>Status</span><span>${esc(submission.status)}</span></div>
                <div class="row"><span>Created</span><span>${esc(submission.created_at)}</span></div>
                <div class="row"><span>Head Hash</span><span>${esc(proof.head_hash)}</span></div>
                <div class="row"><span>QR Payload</span><span>${esc(submission.qr_verification_payload)}</span></div>

                <div class="actions">
                  <a class="btn primary" href="/request-pilot/?review_id=${esc(submission.review_id)}&submission_id=${esc(submission.submission_id)}">Request Pilot</a>
                  <a class="btn soft" href="/regulator/">Open Regulator Mode</a>
                </div>
              </section>

              <section class="panel">
                <h2>Governance Result</h2>
                <div class="row"><span>Execution Domain</span><span>${esc(analysis.execution_domain)}</span></div>
                <div class="row"><span>Decision</span><span>${esc(analysis.governance_decision)}</span></div>
                <div class="row"><span>Score</span><span>${esc(analysis.execution_score)}</span></div>
                <div class="row"><span>Risk Level</span><span>${esc(analysis.risk_level)}</span></div>
                <div class="row"><span>Pilot Readiness</span><span>${esc(analysis.pilot_readiness)}</span></div>
              </section>

            </div>

            <div class="proof-right">

              <section class="panel">
                <h2>Governance Decision Explainer</h2>

                <div class="explain-summary">
                  <h2>
                    EXECUTIA evaluated execution integrity before commitment.
                  </h2>

                  <p>
                    Governance validation was materialized before execution approval. The system evaluated execution continuity, approval order, immutable proof requirements and reconciliation readiness before allowing execution materialization.
                  </p>
                </div>

                <div class="explain-grid">

                  <div class="explain-card">
                    <h3>Detected Execution Risks</h3>
                    <div class="explain-list">
                      ${[
                        "Unverified supplier or execution participant.",
                        "Payment before approval validation.",
                        "Budget overflow or uncontrolled settlement.",
                        "Execution without immutable audit continuity.",
                        "Regulator-unreadable execution evidence."
                      ].map(item => `
                        <div class="explain-item">${item}</div>
                      `).join("")}
                    </div>
                  </div>

                  <div class="explain-card">
                    <h3>Required Governance Controls</h3>
                    <div class="explain-list">
                      ${(Array.isArray(analysis.required_governance_controls)
                        ? analysis.required_governance_controls
                        : []
                      ).map(item => `
                        <div class="explain-item">${esc(item)}</div>
                      `).join("")}
                    </div>
                  </div>

                  <div class="explain-card">
                    <h3>Execution Integrity Controls</h3>
                    <div class="explain-list">
                      ${[
                        "Approval path validated before commitment.",
                        "Proof-chain continuity materialized.",
                        "Timestamp-anchor readiness verified.",
                        "Governance decision recorded immutably.",
                        "Settlement reconciliation prepared."
                      ].map(item => `
                        <div class="explain-item">${item}</div>
                      `).join("")}
                    </div>
                  </div>

                  <div class="explain-card">
                    <h3>Why Execution Was Approved</h3>
                    <div class="explain-list">
                      ${[
                        analysis.execution_score >= 80
                          ? "Execution definition quality exceeded institutional governance threshold."
                          : "Execution definition partially satisfied governance threshold.",
                        "Required execution constraints were structurally defined.",
                        "Immutable proof-chain generation was possible before execution commitment.",
                        "Governance verification and regulator-readable audit structure were available."
                      ].map(item => `
                        <div class="explain-item">${esc(item)}</div>
                      `).join("")}
                    </div>
                  </div>

                </div>
              </section>

            </div>

          </section>

          <section class="panel event-chain-panel">
            <h2>Immutable Event Chain</h2>
            ${chain.map(event => `
              <div class="event">
                <div class="event-top">
                  <strong>${esc(event.index)} · ${esc(event.type)}</strong>
                  <code>${esc(shortHash(event.event_hash))}</code>
                </div>
              </div>
            `).join("")}
          </section>
        </main>
      `;
    }

    loadProof();
  </script>
</body>
</html>
