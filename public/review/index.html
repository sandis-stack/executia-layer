<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EXECUTIA Review Access</title>

<style>
body{
  margin:0;
  background:#f3f6fa;
  font-family:Arial,Helvetica,sans-serif;
  color:#0f2d4a;
}

.shell{
  max-width:960px;
  margin:0 auto;
  padding:48px 20px;
}

.card{
  background:#fff;
  border:1px solid #d9e1ea;
  padding:40px;
}

.kicker{
  font-size:12px;
  letter-spacing:4px;
  font-weight:700;
  color:#60758b;
  margin-bottom:24px;
}

h1{
  margin:0 0 18px;
  font-size:36px;
  line-height:1.1;
}

.lead{
  font-size:16px;
  line-height:1.7;
  color:#42556d;
  margin-bottom:34px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:36px;
}

.metric{
  background:#f4f7fa;
  border-left:4px solid #16385d;
  padding:18px;
}

.metric span{
  display:block;
  font-size:11px;
  letter-spacing:2px;
  color:#60758b;
  margin-bottom:10px;
}

.metric strong{
  font-size:14px;
}

.timeline{
  border-top:1px solid #d9e1ea;
  padding-top:28px;
}

.event{
  padding:18px 0;
  border-bottom:1px solid #e4eaf1;
}

.event-title{
  font-weight:700;
  margin-bottom:8px;
}

.event-time{
  color:#60758b;
  font-size:13px;
  margin-bottom:10px;
}

.footer{
  margin-top:36px;
  color:#60758b;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="shell">
  <div class="card">

    <div class="kicker">
      EXECUTIA · GOVERNANCE REVIEW
    </div>

    <h1>
      Review Access
    </h1>

    <div class="lead">
      Governance review initialized.
      Execution analysis and proof timeline available below.
    </div>

    <div id="metrics" class="grid"></div>
    <div class="timeline" id="controlResult"></div>

    <div class="timeline" id="latestActivity"></div>

    <div class="timeline" id="timeline"></div>

    <div class="footer">
      EXECUTIA™<br/>
      Execution Governance Standard
    </div>

  </div>
</div>

<script>
(async () => {

  const token =
    new URLSearchParams(window.location.search)
      .get("token");

  if(!token){
    alert("TOKEN_MISSING");
    return;
  }

  const res = await fetch(
    `/api/review/access?token=${encodeURIComponent(token)}`
  );

  const data = await res.json();

  if(!data.ok){
    alert(data.error || "ACCESS_DENIED");
    return;
  }

  const review = data.review;

  document.getElementById("metrics").innerHTML = `
    <div class="metric">
      <span>REVIEW ID</span>
      <strong>${review.id}</strong>
    </div>

    <div class="metric">
      <span>REVIEW STATUS</span>
      <strong>${review.review_status || "-"}</strong>
    </div>

    <div class="metric">
      <span>RISK SCORE</span>
      <strong>${review.risk_score ?? "-"}</strong>
    </div>

    <div class="metric">
      <span>DECISION</span>
      <strong>${review.governance_decision || "-"}</strong>
    </div>

    <div class="metric">
      <span>ESCALATION</span>
      <strong>${review.escalation_level ?? "-"}</strong>
    </div>
  `;

  function eventMeaning(type){
    const map = {
      REQUEST_RECEIVED: "Execution request was received and registered.",
      AUTO_ANALYSIS_COMPLETED: "Initial execution analysis was completed automatically.",
      STANDARD_RISK_DETECTED: "Standard governance risk was detected and classified.",
      HIGH_RISK_DETECTED: "High governance risk was detected and escalated.",
      GOVERNANCE_REVIEW_OPENED: "Governance review was opened for controlled assessment.",
      GOVERNANCE_APPROVAL_RECORDED: "Operator approval was recorded for this governance review.",
      GOVERNANCE_QUORUM_PENDING: "Governance approval is recorded, but quorum is not yet complete.",
      GOVERNANCE_APPROVED: "Governance review was approved and execution may proceed.",
      GOVERNANCE_REJECTED: "Governance review was rejected and execution is blocked.",
      GOVERNANCE_OVERRIDDEN: "Governance review was overridden by authorized operator decision.",
      REVIEW_LINK_OPENED: "Client opened the secure governance review link.",
      EXECUTION_COMMITTED: "Execution commit was materialized into the immutable proof layer.",
      EXECUTION_BLOCKED: "Execution commit was blocked by governance control.",
      PROOF_HASH_REGISTERED: "Execution proof hash was registered in the audit chain.",
      SETTLEMENT_CONFIRMED: "Execution settlement confirmation was recorded."
    };

    return map[type] || "Governance event recorded in the execution timeline.";
  }

  function eventStatus(type){
    if(String(type || "").includes("BLOCKED")) return "BLOCKED";
    if(String(type || "").includes("COMMITTED")) return "COMMITTED";
    if(String(type || "").includes("SETTLEMENT")) return "SETTLED";
    if(String(type || "").includes("PROOF_HASH")) return "VERIFIED";
    if(String(type || "").includes("REJECTED")) return "BLOCKED";
    if(String(type || "").includes("APPROVED")) return "APPROVED";
    if(String(type || "").includes("QUORUM")) return "QUORUM";
    if(String(type || "").includes("APPROVAL_RECORDED")) return "RECORDED";
    if(String(type || "").includes("HIGH_RISK")) return "ESCALATED";
    if(String(type || "").includes("RISK")) return "CLASSIFIED";
    if(String(type || "").includes("OPENED")) return "OPEN";
    if(String(type || "").includes("COMPLETED")) return "COMPLETED";
    return "RECORDED";
  }

  const events =
    data.events || [];

  const latest =
    [...events].slice(-3).reverse();

  const approved =
    events.find(e => e.event_type === "GOVERNANCE_APPROVED");

  const rejected =
    events.find(e => e.event_type === "GOVERNANCE_REJECTED");

  const quorum =
    events.find(e => e.event_type === "GOVERNANCE_QUORUM_MET");

  let controlState = "UNDER REVIEW";
  let controlDecision = "PENDING";
  let controlDescription =
    "Governance review is currently under controlled assessment.";

  if(quorum){
    controlState = "QUORUM VERIFIED";
  }

  if(approved){
    controlState = "EXECUTION APPROVED";
    controlDecision = "ALLOW_COMMIT";
    controlDescription =
      "Governance quorum approved execution progression.";
  }

  if(rejected){
    controlState = "EXECUTION BLOCKED";
    controlDecision = "BLOCK_COMMIT";
    controlDescription =
      "Governance review rejected execution progression.";
  }

  document.getElementById("controlResult").innerHTML = `
    <div class="event-title" style="margin-bottom:18px;">
      Control result
    </div>

    <div class="grid">
      <div class="metric">
        <span>CONTROL STATE</span>
        <strong>${controlState}</strong>
      </div>

      <div class="metric">
        <span>DECISION</span>
        <strong>${controlDecision}</strong>
      </div>

      <div class="metric">
        <span>RISK</span>
        <strong>${review.risk_score ?? "-"}</strong>
      </div>

      <div class="metric">
        <span>QUORUM</span>
        <strong>${quorum ? "VERIFIED" : "PENDING"}</strong>
      </div>
    </div>

    <div style="margin-top:24px;font-size:15px;line-height:1.7;color:#42556d;">
      ${controlDescription}
    </div>
  `;

  document.getElementById("latestActivity").innerHTML = `
    <div class="event-title" style="margin-bottom:18px;">
      Latest activity
    </div>
    ${latest.map(event => `
      <div class="event">
        <div class="event-title">${event.event_type || "EVENT"}</div>
        <div class="event-time">${event.created_at || ""}</div>
        <div style="font-size:14px;line-height:1.6;color:#42556d;">
          ${eventMeaning(event.event_type || "EVENT")}
        </div>
      </div>
    `).join("")}
  `;

  document.getElementById("timeline").innerHTML =
    events.map(event => {
      const type = event.event_type || "EVENT";
      const payload = event.payload || {};

      return `
        <div class="event">
          <div class="event-title">
            ${type}
          </div>

          <div class="event-time">
            ${event.created_at || ""}
          </div>

          <div style="font-size:14px;line-height:1.6;color:#42556d;margin-bottom:10px;">
            ${eventMeaning(type)}
          </div>

          <div style="display:inline-block;padding:5px 9px;border-left:3px solid #0f2d4a;background:#f4f7fa;font-size:10px;letter-spacing:1.4px;font-weight:700;color:#42556d;">
            STATUS · ${eventStatus(type)}
          </div>
        </div>
      `;
    }).join("");

})();
</script>

</body>
</html>
